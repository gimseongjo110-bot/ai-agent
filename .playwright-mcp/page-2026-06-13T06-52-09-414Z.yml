            - paragraph [ref=e164]:
              - text: 인공지능(人工智能,
              - generic [ref=e165]:
                - link "영어" [ref=e166] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/영어
                - text: ":"
              - generic [ref=e167]: artificial intelligence, AI
              - text: )은
              - link "인간" [ref=e168] [cursor=pointer]:
                - /url: //ko.wikipedia.org/wiki/사람
              - text: 의 학습능력,
              - link "추론능력" [ref=e169] [cursor=pointer]:
                - /url: //ko.wikipedia.org/wiki/추론
              - text: ", 지각능력을 인공적으로 구현하려는"
              - link "컴퓨터 과학" [ref=e170] [cursor=pointer]:
                - /url: //ko.wikipedia.org/wiki/컴퓨터_과학
              - text: 의 세부분야 중 하나이다. 정보공학 분야에 있어 하나의
              - link "인프라" [ref=e171] [cursor=pointer]:
                - /url: //ko.wikipedia.org/wiki/기반_시설
              - text: 기술이기도 하다.
              - superscript [ref=e172]:
                - link "[1]" [ref=e173] [cursor=pointer]:
                  - /url: "#cite_note-1"
                  - generic [ref=e174]: "[1]"
              - superscript [ref=e175]:
                - link "[2]" [ref=e176] [cursor=pointer]:
                  - /url: "#cite_note-2"
                  - generic [ref=e177]: "[2]"
              - text: 인간을 포함한 동물이 갖고 있는 지능 즉, 자연 지능(natural intelligence)과는 다른 개념이다.
            - paragraph [ref=e178]:
              - text: 인간의 지능을 모방한 기능을 갖춘
              - link "컴퓨터 시스템" [ref=e179] [cursor=pointer]:
                - /url: //ko.wikipedia.org/wiki/컴퓨터_시스템
              - text: 이며, 인간의 지능을 기계 등에 인공적으로 시연(구현)한 것이다. 일반적으로 범용 컴퓨터에 적용한다고 가정한다. 이 용어는 또한 그와 같은 지능을 만들 수 있는 방법론이나 실현 가능성 등을 연구하는 과학 기술 분야를 지칭하기도 한다.
              - superscript [ref=e180]:
                - link "[3]" [ref=e181] [cursor=pointer]:
                  - /url: "#cite_note-3"
                  - generic [ref=e182]: "[3]"
              - superscript [ref=e183]:
                - link "[4]" [ref=e184] [cursor=pointer]:
                  - /url: "#cite_note-4"
                  - generic [ref=e185]: "[4]"
              - superscript [ref=e186]:
                - link "[5]" [ref=e187] [cursor=pointer]:
                  - /url: "#cite_note-5"
                  - generic [ref=e188]: "[5]"
          - region "강인공지능과 약인공지능" [ref=e189]:
            - heading "강인공지능과 약인공지능" [level=2] [ref=e191]: 강인공지능과 약인공지능
            - paragraph [ref=e192]:
              - text: 초기 인공지능 연구에 대한 대표적인 정의는 다트머스 회의에서 존 매카시가 제안한 것으로 "기계를 인간 행동의 지식에서와 같이 행동하게 만드는 것"이다. 그러나 이 정의는
              - link "범용인공지능" [ref=e193] [cursor=pointer]:
                - /url: //ko.wikipedia.org/wiki/범용인공지능
              - text: (AGI, 강한 인공지능)에 대한 고려를 하지 못한 것 같다. 인공지능의 또다른 정의는 인공적인 장치들이 가지는 지능이다. 거의 대부분 정의들이 인간처럼 사고하는 시스템, 인간처럼 행동하는 시스템, 이성적으로 사고하는 시스템 그리고 이성적으로 행동하는 시스템이라는 4개의 분류로 분류된다.
              - superscript [ref=e194]:
                - link "[6]" [ref=e195] [cursor=pointer]:
                  - /url: "#cite_note-6"
                  - generic [ref=e196]: "[6]"
              - text: 인공지능의 작동 방식이 의사 결정과 문제 해결, 학습에 있어 사람의 생각이나 행동과 유사할수록 강한 인공지능으로 분류되고, 논리에 의해 만들어지는 합리적인 생각이나 행동에 가까울수록 약한 인공지능으로 분류된다.
              - superscript [ref=e197]:
                - link "[7]" [ref=e198] [cursor=pointer]:
                  - /url: "#cite_note-K19-7"
                  - generic [ref=e199]: "[7]"
            - region "약인공지능" [ref=e200]:
              - heading "약인공지능" [level=3] [ref=e202]: 약인공지능
              - note [ref=e203]:
                - text: 이 부분의 본문은
                - link "약한 인공지능" [ref=e206] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/약한_인공지능
                - text: 입니다.
              - paragraph [ref=e207]: 약인공지능(weak AI)은 사진에서 물체를 찾거나 소리를 듣고 상황을 파악하는 것과 같이 기존에 인간은 쉽게 해결할 수 있으나 컴퓨터로 처리하기에는 어려웠던 각종 문제를 컴퓨터로 수행하게 만드는데 중점을 두고 있다. 한참 막연한 인간 지능을 목표로 하기보다는 더 현실적으로 실용적인 목표를 가지고 개발되고 있는 인공지능이라고 할 수 있으며, 일반적인 지능을 가진 무언가라기보다는 특정한 문제를 해결하는 도구로써 활용된다.
              - paragraph [ref=e208]:
                - link "강인공지능" [ref=e209] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/강인공지능
                - text: (strong AI) 또는
                - link "인공 일반 지능" [ref=e211] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/인공_일반_지능
                - text: (artificial general intelligence, AGI)은 인간처럼 실제로 사고하여 문제를 해결할 수 있는 "일반 지능"을 인공적으로 구현하려는 시도이다. 오늘날 이 분야의 연구는 주로 미리 정의된 규칙의 모음을 이용해서 지능을 흉내내는 컴퓨터 프로그램을 개발하는 것에 맞추어져 있다. 강한 인공지능 분야의 발전은 여전히 미약하지만, 인간과 같은 지능이라는 목표를 어떻게 정의하는지에 따라 어느 정도 발전이 이루어지고 있다고도 볼 수 있다. AGI의 구현을 위해서는 단순한 데이터 처리를 넘어 추론, 문제 해결, 지식 표현, 계획 수립 및 의사결정, 그리고 학습이라는 지능적 특성들이 통합적으로 작용해야 한다. 특히, 특정 도메인에 국한되지 않고 새로운 환경에서도 스스로 학습하여 적응하는 일반화 능력이 핵심적인 요소로 꼽힌다.
                - superscript [ref=e212]:
                  - link "[8]" [ref=e213] [cursor=pointer]:
                    - /url: "#cite_note-8"
                    - generic [ref=e214]: "[8]"
          - region "역사" [ref=e215]:
            - heading "역사" [level=2] [ref=e217]: 역사
            - note [ref=e218]:
              - text: 이 부분의 본문은
              - link "인공지능의 역사" [ref=e221] [cursor=pointer]:
                - /url: //ko.wikipedia.org/wiki/인공지능의_역사
              - text: 입니다.
            - region "인공지능 이론의 발전" [ref=e222]:
              - heading "인공지능 이론의 발전" [level=3] [ref=e224]: 인공지능 이론의 발전
              - paragraph [ref=e225]:
                - text: 상당수 인공지능 연구의 (본래) 목적은 심리학에 대한 실험적인 접근이었고, 언어 지능(linguistic intelligence)이 무엇인지를 밝혀내는 것이 주목표였다(
                - link "튜링 테스트" [ref=e226] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/튜링_테스트
                - text: 가 대표적인 예이다).
              - paragraph [ref=e227]:
                - text: 언어 지능을 제외한 인공지능에 대한 시도들은
                - link "로보틱스" [ref=e228] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/로보틱스
                - text: 와 집합적 지식을 포함한다. 이들은 환경에 대한 처리, 의사 결정을 일치시키는 것에 중심을 두며 어떻게 지능적 행동이 구성되는 것인가를 찾을 때,
                - link "생물학" [ref=e229] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/생물학
                - text: 과,
                - link "정치과학" [ref=e230] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/정치과학
                - text: 으로부터 이끌어 낸다. 사회적 계획성과 인지성의 능력은 떨어지지만 인간과 유사한 유인원을 포함한, 복잡한 인식방법을 가진 동물뿐만 아니라 특히 곤충들(로봇들로 모방하기 쉬운)까지 포함한 동물학으로부터 인공지능 과학은 시작된다. 여러 가지 생명체들의 모든 논리구조를 가져온 다는 것은 이론적으로는 가능하지만 수치화, 기계화 한다는 것은 쉬운 일이 아니다.
              - paragraph [ref=e231]:
                - text: 인공지능 학자는 동물들은 인간들보다 모방하기 쉽다고 주장한다. 그러나 동물의 지능을 만족하는 계산 모델은 없다.
                - link "매컬러" [ref=e232] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/워런_매컬러?action=edit&redlink=1
                - text: 가 쓴 신경 행동에서 내재적 사고의 논리적 계산
                - superscript [ref=e233]:
                  - link "[9]" [ref=e234] [cursor=pointer]:
                    - /url: "#cite_note-9"
                    - generic [ref=e235]: "[9]"
                - text: ","
                - link "튜링" [ref=e236] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/앨런_튜링
                - text: 의 기계와 지능의 계산
                - superscript [ref=e237]:
                  - link "[10]" [ref=e238] [cursor=pointer]:
                    - /url: "#cite_note-10"
                    - generic [ref=e239]: "[10]"
                - text: 그리고
                - link "리클라이더" [ref=e240] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/J._C._R._리클라이더
                - text: 의 인간과 컴퓨터의 공생
                - superscript [ref=e241]:
                  - link "[11]" [ref=e242] [cursor=pointer]:
                    - /url: "#cite_note-11"
                    - generic [ref=e243]: "[11]"
                - text: 가 기계 지능의 개념에 관한 독창적인 논문들이다.
              - paragraph [ref=e244]:
                - text: 존 루커스의 지성, 기계, 괴델
                - superscript [ref=e245]:
                  - link "[12]" [ref=e246] [cursor=pointer]:
                    - /url: "#cite_note-12"
                    - generic [ref=e247]: "[12]"
                - text: 과 같은 논리학과 철학기반의 기계지능의 가능성을 부인한 초기 논문들도 있다.
                - superscript [ref=e248]:
                  - link "[13]" [ref=e249] [cursor=pointer]:
                    - /url: "#cite_note-13"
                    - generic [ref=e250]: "[13]"
              - paragraph [ref=e251]: 인공지능 연구에 바탕을 둔 실질적인 작업이 결실을 거둠에 따라, 인공지능을 지지하는 사람들은 인공지능의 업적을 깎아내리기 위해 인공지능에 반대하는 사람들이 예전에는 '지능적'인 일이라고 주장하던 컴퓨터 체스나 바둑, 음성인식 등과 같은 작업에 대해 말을 바꾸고 있다고 비난하였다. 그들은 이와 같이 연구 목표를 옮기는 작업은 '지능'을 '인간은 할 수 있지만, 기계는 할 수 없는 어떤 것'으로 정의하는 역할을 한다고 지적하였다.
              - paragraph [ref=e252]:
                - text: (E.T. Jaynes에 따르면)
                - link "존 폰 노이만" [ref=e253] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/존_폰_노이만
                - text: 은 이미 이를 예측하였는데,
                - link "1948년" [ref=e254] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/1948년
                - text: 에 기계가 생각하는 것은 불가능하다는 강의를 듣고 다음과 같이 말하였다. "당신은 기계가 할 수 없는 어떤 것이 있다고 주장한다. 만일 당신이 그 기계가 할 수 없는 것이 무엇인지를 정확하게 이야기해준다면, 나는 언제든지 그 일을 수행할 수 있는 기계를 만들 수 있다." 했다. 폰 노이만은 이미 그 전에 모든 처리절차(procedure)는 (범용)컴퓨터에 의해서 시뮬레이션 될 수 있다고 이야기함에 따라 쳐치-튜링 이론을 언급했다.
              - paragraph [ref=e255]:
                - link "1969년" [ref=e256] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/1969년
                - text: 에 매카시와 헤이스는 그들의 논문 "인공지능 관점에서 바라본 철학적인 문제들"에서
                - link "프레임 문제" [ref=e257] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/프레임_문제
                - text: 를 언급하였다.
            - region "인공지능의 탄생(1943-1956)" [ref=e258]:
              - heading "인공지능의 탄생(1943-1956)" [level=3] [ref=e260]: 인공지능의 탄생(1943-1956)
              - paragraph [ref=e261]: 1940년대 후반과 1950년대 초반에 이르러서 수학, 철학, 공학, 경제 등 다양한 영역의 과학자들에게서 인공적인 두뇌의 가능성이 논의되었다. 1956년에 이르러서, 인공지능이 학문 분야로 들어섰다.
              - region "인공두뇌학과 초기 신경 네트워크" [ref=e262]:
                - heading "인공두뇌학과 초기 신경 네트워크" [level=4] [ref=e264]: 인공두뇌학과 초기 신경 네트워크
                - paragraph [ref=e265]:
                  - text: 생각하는 기계에 대한 초기 연구는 30년대 후기에서부터 50년대 초기의 유행한 아이디어에 영감을 얻은 것이었다. 당시 신경학의 최신 연구는 실제 뇌가 뉴런으로 이루어진 전기적인 네트워크라고 보았다.
                  - link "위너" [ref=e266] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/노버트_위너
                  - text: 가 인공두뇌학을 전기적 네트워크의 제어와 안정화로 묘사했으며,
                  - link "섀넌" [ref=e267] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/클로드_섀넌
                  - text: 의 정보 과학은 디지털 신호로 묘사했다. 또 튜링의 계산 이론은 어떤 형태의 계산도 디지털로 나타낼 수 있음을 보였다. 이런 여러 밀접한 연관에서, 인공두뇌의 전자적 구축에 대한 아이디어가 나온 것이다.
                  - superscript [ref=e268]:
                    - link "[14]" [ref=e269] [cursor=pointer]:
                      - /url: "#cite_note-14"
                      - generic [ref=e270]: "[14]"
                  - link "월터" [ref=e271] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/윌리엄_그레이_윌터?action=edit&redlink=1
                  - text: 의 거북이 로봇이 이 아이디어를 중요하게 포함한 연구의 예이다. 이 기계는 컴퓨터를 사용하지 않고 아날로그 회로를 이용했지만, 디지털의 전자적, 상징적 추리를 보여주기엔 충분했다.
                  - superscript [ref=e272]:
                    - link "[15]" [ref=e273] [cursor=pointer]:
                      - /url: "#cite_note-15"
                      - generic [ref=e274]: "[15]"
                  - text: 월터 피츠(Walter Pitts)와 워런 매컬러(Warren Sturgis McCulloch)는 인공 신경망에 기인한 네트워크를 분석하고 그들이 어떻게 간단한 논리적 기능을 하는지 보여주었다. 그들은 후에 신경 네트워크
                  - superscript [ref=e275]:
                    - link "[16]" [ref=e276] [cursor=pointer]:
                      - /url: "#cite_note-16"
                      - generic [ref=e277]: "[16]"
                  - text: 라 부르는 기술을 첫번째로 연구한 사람이다. 피츠와 매컬러는 24살의 대학원생인 젊은
                  - link "마빈 민스키" [ref=e278] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/마빈_민스키
                  - text: 를 만났고, 민스키는 1951년 첫번째 신경 네트워크 기계인 SNARC
                  - superscript [ref=e279]:
                    - link "[17]" [ref=e280] [cursor=pointer]:
                      - /url: "#cite_note-17"
                      - generic [ref=e281]: "[17]"
                  - text: 를 구축했다. 민스키는 향후 50년동안 인공지능의 가장 중요한 지도적, 혁신적 인물 중 하나가 되었다.
              - region "튜링 테스트" [ref=e282]:
                - heading "튜링 테스트" [level=4] [ref=e284]: 튜링 테스트
                - paragraph [ref=e285]:
                  - text: 1950년
                  - link "앨런 튜링" [ref=e286] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/앨런_튜링
                  - text: 은 생각하는 기계의 구현 가능성에 대한 분석이 담긴, 인공지능 역사에서 혁혁한 논문을 발표했다.
                  - superscript [ref=e287]:
                    - link "[18]" [ref=e288] [cursor=pointer]:
                      - /url: "#cite_note-18"
                      - generic [ref=e289]: "[18]"
                  - text: 그는 "생각"을 정의하기 어려움에 주목해, 그 유명한 튜링테스트를 고안했다. 텔레프린터를 통한 대화에서 기계가 사람인지 기계인지 구별할 수 없을 정도로 대화를 잘 이끌어 간다면, 이것은 기계가 "생각"하고 있다고 말할 충분한 근거가 된다는 것이었다.
                  - superscript [ref=e290]:
                    - link "[19]" [ref=e291] [cursor=pointer]:
                      - /url: "#cite_note-19"
                      - generic [ref=e292]: "[19]"
                  - text: 튜링 테스트는 인공 지능에 대한 최초의 심도 있는 철학적 제안으로 평가받는다.
              - region "게임 인공지능" [ref=e293]:
                - heading "게임 인공지능" [level=4] [ref=e295]: 게임 인공지능
                - paragraph [ref=e296]:
                  - text: 1951년에, 맨체스터 대학의 페란티 마크 1(Ferranti Mark 1) 기계를 사용하여 크리스토퍼 스트레이(Christopher Strachey)는 체커 프로그램을 작성했고, 디트리히 프린츠(Dietrich Prinz)는 체스 프로그램을 작성했다.
                  - superscript [ref=e297]:
                    - link "[20]" [ref=e298] [cursor=pointer]:
                      - /url: "#cite_note-20"
                      - generic [ref=e299]: "[20]"
                  - text: 아서 새뮤얼(Arthur Samuel)이 50년대 중반과 60년대 초반에 개발한 체커 프로그램은 결국 존경받는 아마추어에 도전할 수 있는 충분한 기술적 발전을 이룩했다.
                  - superscript [ref=e300]:
                    - link "[21]" [ref=e301] [cursor=pointer]:
                      - /url: "#cite_note-21"
                      - generic [ref=e302]: "[21]"
              - region "상징 추론과 논리 이론" [ref=e303]:
                - heading "상징 추론과 논리 이론" [level=4] [ref=e305]: 상징 추론과 논리 이론
                - paragraph [ref=e306]:
                  - text: 디지털 컴퓨터에 접할 수 있어진 50년대 중반에 이르러서, 몇몇 과학자들은 직관적으로 기계가 수를 다루듯 기호를 다루고, 사람처럼 기호의 본질적인 부분'까지 다룰 수 있을 것이라고 생각했다.
                  - superscript [ref=e307]:
                    - link "[22]" [ref=e308] [cursor=pointer]:
                      - /url: "#cite_note-22"
                      - generic [ref=e309]: "[22]"
                  - text: 이것은 생각하는 기계를 만드는 새로운 접근 방법이었다. 1956년
                  - superscript [ref=e310]:
                    - link "[23]" [ref=e311] [cursor=pointer]:
                      - /url: "#cite_note-23"
                      - generic [ref=e312]: "[23]"
                  - text: 에, 앨런 뉴얼(Allen Newell)과 허버트 사이먼(Herbert A. Simon)은 "논리 이론"을 구현했다. 그 프로그램은 결국 러셀과 화이트헤드의 '수학 원리'에 나오는 52개의 정리 중 32개를 증명해냈고, 일부 새롭고 더 우아한 증거를 찾아내기도 했다.
                  - superscript [ref=e313]:
                    - link "[24]" [ref=e314] [cursor=pointer]:
                      - /url: "#cite_note-24"
                      - generic [ref=e315]: "[24]"
              - 'region "다트머스 컨퍼런스 1956년: AI의 탄생" [ref=e316]':
                - 'heading "다트머스 컨퍼런스 1956년: AI의 탄생" [level=4] [ref=e318]': "다트머스 컨퍼런스 1956년: AI의 탄생"
                - paragraph [ref=e319]:
                  - text: "1956"
                  - superscript [ref=e320]:
                    - link "[25]" [ref=e321] [cursor=pointer]:
                      - /url: "#cite_note-25"
                      - generic [ref=e322]: "[25]"
                  - text: 년에 열린 다트머스 컨퍼런스는
                  - link "마빈 민스키" [ref=e323] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/마빈_민스키
                  - text: 와
                  - link "존 매카시" [ref=e324] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/존_매카시
                  - text: ", 그리고 IBM의 수석 과학자인"
                  - link "클로드 섀넌" [ref=e325] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/클로드_섀넌
                  - text: 과
                  - link "네이선 로체스터" [ref=e326] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/네이선_로체스터?action=edit&redlink=1
                  - text: 가 개최했다. 컨퍼런스는 "학습의 모든 면 또는 지능의 다른 모든 특성로 기계를 정밀하게 기술할 수 있고 이를 시물레이션 할 수 있다"
                  - superscript [ref=e327]:
                    - link "[26]" [ref=e328] [cursor=pointer]:
                      - /url: "#cite_note-26"
                      - generic [ref=e329]: "[26]"
                  - text: 라는 주장을 포함하여 제안을 제기했다. 참가자는 레이 솔로모노프(Ray Solomonoff),
                  - link "올리버 셀프리지" [ref=e330] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/올리버_셀프리지
                  - text: (Oliver Selfridge),
                  - link "트렌처드 모어" [ref=e331] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/트렌처드_모어?action=edit&redlink=1
                  - text: (Trenchard More), 아서 새뮤얼(Arthur Smuel), 앨런 뉴얼(Allen Newell)과 허버트 사이먼(Herbert A. Simon)으로, 그들 모두 수십년동안 인공지능 연구에서 중요한 프로그램을 만들어온 사람들이었다.
                  - superscript [ref=e332]:
                    - link "[27]" [ref=e333] [cursor=pointer]:
                      - /url: "#cite_note-27"
                      - generic [ref=e334]: "[27]"
                  - text: 컨퍼런스에서 뉴얼과 사이먼은 "논리 이론"을 소개했고, 매카시는 Artificial Intelligence를 그들의 연구를 칭하는 이름으로 받아들이길 설득했다.
                  - superscript [ref=e335]:
                    - link "[28]" [ref=e336] [cursor=pointer]:
                      - /url: "#cite_note-28"
                      - generic [ref=e337]: "[28]"
                  - text: 1956년 다트머스 컨퍼런스는 AI 라는 이름, 목표점, 첫번째 성공과 이를 이룬 사람들, 그리고 넓은 의미의 AI의 탄생을 포함하는 순간이었다.
                  - superscript [ref=e338]:
                    - link "[29]" [ref=e339] [cursor=pointer]:
                      - /url: "#cite_note-29"
                      - generic [ref=e340]: "[29]"
            - region "황금기(1956~1974년)" [ref=e341]:
              - heading "황금기(1956~1974년)" [level=3] [ref=e343]: 황금기(1956~1974년)
              - paragraph [ref=e344]:
                - text: 다트머스 컨퍼런스 이후에, AI라는 새로운 영역은 발전의 땅을 질주하기 시작했다. 이 기간에 만들어진 프로그램은 많은 사람들을 "놀랍게(astonishing)
                - superscript [ref=e345]:
                  - link "[30]" [ref=e346] [cursor=pointer]:
                    - /url: "#cite_note-30"
                    - generic [ref=e347]: "[30]"
                - text: "\"만들었는데, 프로그램은 대수학 문제를 풀었고 기하학의 정리를 증명했으며 영어를 학습했다. 몇 사람들은 이와같은 기계의 \"지능적\" 행동을 보고 AI로 모든 것이 가능할 것이라 믿었다."
                - superscript [ref=e348]:
                  - link "[31]" [ref=e349] [cursor=pointer]:
                    - /url: "#cite_note-31"
                    - generic [ref=e350]: "[31]"
                - text: 연구가들은 개인의 의견 또는 출판물들을 통해 낙관론을 펼쳤고, 완전한 지능을 갖춘 기계가 20년 안에 탄생할 것이라고 예측했다.
                - superscript [ref=e351]:
                  - link "[32]" [ref=e352] [cursor=pointer]:
                    - /url: "#cite_note-32"
                    - generic [ref=e353]: "[32]"
                - text: ARPA(Advanced Research Projects Agency)같은 정부 기관은 이 새로운 분야에 돈을 쏟아부었다.
                - superscript [ref=e354]:
                  - link "[33]" [ref=e355] [cursor=pointer]:
                    - /url: "#cite_note-33"
                    - generic [ref=e356]: "[33]"
              - region "작업들" [ref=e357]:
                - heading "작업들" [level=4] [ref=e359]: 작업들
                - paragraph [ref=e360]: 많은 성공적인 프로그램과 새로운 발전 방향이 50년대 후반과 60년대에 나타났다. 이곳에는 AI 역사에 지대한 영향을 미친 것들을 기술했다.
                - region "탐색 추리" [ref=e361]:
                  - heading "탐색 추리" [level=5] [ref=e363]: 탐색 추리
                  - paragraph [ref=e364]:
                    - text: 초기 AI 프로그램은 동일한 기본적인 알고리즘을 사용했다. 게임의 승리나 정리 증명 같은 어떤 목표 달성을 위해, 그들은 한발짝식 나아가는(step-by-step) 방식을 상용했다. 예를 들어
                    - link "미로" [ref=e365] [cursor=pointer]:
                      - /url: //ko.wikipedia.org/wiki/미로
                    - text: 를 찾아갈때 계속 나아가면서 막힌 길이 있으면 다른 길이 있는 곳까지 되돌아 왔다가 다른 길로 가는 식이었다. 이런 패러다임은 "탐색 추리"라 불렸다.
                    - superscript [ref=e366]:
                      - link "[34]" [ref=e367] [cursor=pointer]:
                        - /url: "#cite_note-34"
                        - generic [ref=e368]: "[34]"
                    - text: 주요한 문제는, 간단한 미로에 있어서도 경로로 사용할 수 있는 수가 천문학적으로 많았다는 것이다. 연구가들은 추론 또는 경험적으로 찾은 규칙으로 정답이 아닌듯 보이는 경로를 지우는 방식을 사용했다.
                    - superscript [ref=e369]:
                      - link "[35]" [ref=e370] [cursor=pointer]:
                        - /url: "#cite_note-35"
                        - generic [ref=e371]: "[35]"
                    - text: 뉴엘과 사이먼은 "범용 문제 해결기(General Problem Solver)
                    - superscript [ref=e372]:
                      - link "[36]" [ref=e373] [cursor=pointer]:
                        - /url: "#cite_note-36"
                        - generic [ref=e374]: "[36]"
                    - text: "\"라 부르는 프로그램 속 알고리즘의 범용적인 버전을 포착하려고 노력했다. 다른 \"검색\" 프로그램은 기하학과 대수학의 문제를 해결하는 것처럼 인상적인 작업 - 허버트 게랜터(Herbert Gelenter)의 \"기하학 해결기\"나 민스키의 제자인 제임스 슬레이글(James Slage)의 SAINT - 을 수행하길 시도했다."
                    - superscript [ref=e375]:
                      - link "[37]" [ref=e376] [cursor=pointer]:
                        - /url: "#cite_note-37"
                        - generic [ref=e377]: "[37]"
                    - text: 다른 프로그램은 목표와 목표에 다가가기 위한 세부 계획을 검색했고, 여기에는 스탠포드에서 샤키(Shakey) 로봇의 동작을 제어하기 위해 개발한 STRIPS 시스템을 포함한다.
                    - superscript [ref=e378]:
                      - link "[38]" [ref=e379] [cursor=pointer]:
                        - /url: "#cite_note-38"
                        - generic [ref=e380]: "[38]"
                - region "자연어 처리" [ref=e381]:
                  - heading "자연어 처리" [level=5] [ref=e383]: 자연어 처리
                  - paragraph [ref=e384]:
                    - text: AI 연구의 중요한 목표는 영어와 같은 자연어로 컴퓨터와 의사소통할 수 있게 하는 것이었다. 일찍이 다니엘 보로우(Daniel Bobrow)의 STUDENT라는 프로그램은 고등학교 수준의 대수학 단어 문제를 푸는 성공을 보였다.
                    - superscript [ref=e385]:
                      - link "[39]" [ref=e386] [cursor=pointer]:
                        - /url: "#cite_note-39"
                        - generic [ref=e387]: "[39]"
                    - text: "'의미 망'은 개념을 다른 개념들 사이의 노드와 링크 관계로 나타낸다. 의미 망을 사용하는 첫 번째 AI 프로그램은 로스 퀄리언(Ross Quillian)"
                    - superscript [ref=e388]:
                      - link "[40]" [ref=e389] [cursor=pointer]:
                        - /url: "#cite_note-40"
                        - generic [ref=e390]: "[40]"
                    - text: 이 작성했고 가장 성공이며 동시에 논쟁이 많았던 버전은 로거 섕크(Roger Schank)의 "개념 종속 이론(Conceptual dependency theory)"이다.
                    - superscript [ref=e391]:
                      - link "[41]" [ref=e392] [cursor=pointer]:
                        - /url: "#cite_note-41"
                        - generic [ref=e393]: "[41]"
                    - text: 조셉 웨이젠바움(Joseph Weizenbaum)의 ELIZA는 사람들이 그들이 대화를 나누는 때때로 상대가 컴퓨터가 아니라 사람이라고 생각할 정도의 질로 대화했다. 사실, ELIZA는 스스로 생각하여 말하지 않았다. 그 프로그램은 오직 판에 박힌 말을 하거나, 상대에게 방금 말한 말을 다시 해 달라고 요청하거나, 상대가 한 말을 몇 개의 문법 법칙에 의해 파싱 할 뿐이었다. ELIZA는 첫 번째 채팅 프로그램이 되었다.
                    - superscript [ref=e394]:
                      - link "[42]" [ref=e395] [cursor=pointer]:
                        - /url: "#cite_note-42"
                        - generic [ref=e396]: "[42]"
                - region "마이크로월드" [ref=e397]:
                  - heading "마이크로월드" [level=5] [ref=e399]: 마이크로월드
                  - paragraph [ref=e400]:
                    - text: 1960년대 후반에, MIT의 AI 연구소에 있던
                    - link "마빈 민스키" [ref=e401] [cursor=pointer]:
                      - /url: //ko.wikipedia.org/wiki/마빈_민스키
                    - text: 와
                    - link "시모어 페퍼트" [ref=e402] [cursor=pointer]:
                      - /url: //ko.wikipedia.org/wiki/시모어_페퍼트
                    - text: 는 마이크로월드 연구로 불리는, 인위적인 간단한 상황에 초점을 맞춘 AI 연구를 제안했다. 그들은 성공적인 과학자들이 자주 쉬운 이해를 위해 '마찰면'이라든지 '강체(물리학에서 결코 형태가 변하지 않는 물체)'같은 간단한 모델을 사용한다는 것에 집중했다. 이런 연구의 대부분이 평평한 평면 위의 다양한 형태와 색깔의 블록으로 이루어진 '블록 단위의 세계'에 초점을 맞추는 형식이었다.
                    - superscript [ref=e403]:
                      - link "[43]" [ref=e404] [cursor=pointer]:
                        - /url: "#cite_note-43"
                        - generic [ref=e405]: "[43]"
                  - paragraph [ref=e406]:
                    - text: 제럴드 서스먼(Gerald Sussman)을 필두로 아돌포 구스만(Adolfo Guzman), 데이비드 월츠(David Waltz) 그리고 패트릭 윈스턴(Patrick Winston)이 마이크로월드 패러다임으로 기계 비전의 혁신을 이끌었다. 같은 시간에, 민스키와 페퍼는 블록을 쌓을 수 있는 로봇 팔을 제작했다. 마이크로월드의 영광스러운 성취는 테리 위노가드(Terry Winograd)의 SHRDLU이며, 이것은 보통의 일반 문장으로 소통해 작업을 계획하고 이를 실행할 수 있었다.
                    - superscript [ref=e407]:
                      - link "[44]" [ref=e408] [cursor=pointer]:
                        - /url: "#cite_note-44"
                        - generic [ref=e409]: "[44]"
              - region "낙관론" [ref=e410]:
                - heading "낙관론" [level=4] [ref=e412]: 낙관론
                - paragraph [ref=e413]: AI 연구의 첫 번째 세대는 그들의 연구 결과에 대해 다음과 같이 예측했다.
                - list [ref=e414]:
                  - listitem [ref=e415]:
                    - text: "1958년, 사이먼(H. A. Simon)과 뉴얼(Allen Newell) : \"10년 내에 디지털 컴퓨터가 체스 세계 챔피언을 이길 것이다\", 덧붙여 \"10년 내에 디지털 컴퓨터는 중요한 새로운 수학적 정리를 발견하고 증명할 것이다\"라고 말했다."
                    - superscript [ref=e416]:
                      - link "[45]" [ref=e417] [cursor=pointer]:
                        - /url: "#cite_note-45"
                        - generic [ref=e418]: "[45]"
                  - listitem [ref=e419]:
                    - text: "1965년, 사이먼 : \"20년 내에 기계가 사람이 할 수 있는 모든 일을 할 것이다.\""
                    - superscript [ref=e420]:
                      - link "[46]" [ref=e421] [cursor=pointer]:
                        - /url: "#cite_note-46"
                        - generic [ref=e422]: "[46]"
                  - listitem [ref=e423]:
                    - text: "1967년, 마빈 민스키 : \"이번 세기에 AI를 만드는 문제는 거의 해결 될 것이다.\""
                    - superscript [ref=e424]:
                      - link "[47]" [ref=e425] [cursor=pointer]:
                        - /url: "#cite_note-47"
                        - generic [ref=e426]: "[47]"
                  - listitem [ref=e427]:
                    - text: "1970년, 마빈 민스키 : (Life 잡지를 통해서) \"3~8년안에 우리는 평균정도의 인간 지능을 가지는 기계를 가지게 될 것입니다.\""
                    - superscript [ref=e428]:
                      - link "[48]" [ref=e429] [cursor=pointer]:
                        - /url: "#cite_note-48"
                        - generic [ref=e430]: "[48]"
              - region "자금" [ref=e431]:
                - heading "자금" [level=4] [ref=e433]: 자금
                - paragraph [ref=e434]:
                  - text: 1963년 6월, MIT는 220만 달러를 고등 연구 계획국(Advanced Research Projects Agency - 후에 DARPA로 알려짐)에게 제공받았다. 자금은 민스키와 매카시가 5년전 설립한 "AI 그룹"이 포섭한 프로젝트 MAC에서 사용되었다. DARPA는 계속해서 매년 300만 달러를 70년대까지 제공했다.
                  - superscript [ref=e435]:
                    - link "[49]" [ref=e436] [cursor=pointer]:
                      - /url: "#cite_note-49"
                      - generic [ref=e437]: "[49]"
                  - text: DARPA는 또한 유사한 자금을 뉴얼과 사이먼의 CMU 프로그램과 스탠포드 AI 프로젝트에 제공했다.
                  - superscript [ref=e438]:
                    - link "[50]" [ref=e439] [cursor=pointer]:
                      - /url: "#cite_note-50"
                      - generic [ref=e440]: "[50]"
                  - text: 또다른 중요한 AI 연구소는 1965년
                  - link "도널드 미키" [ref=e441] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/도널드_미키
                  - text: 가
                  - link "에든버러 대학교" [ref=e442] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/에든버러_대학교
                  - text: 에 세웠다.
                  - superscript [ref=e443]:
                    - link "[51]" [ref=e444] [cursor=pointer]:
                      - /url: "#cite_note-51"
                      - generic [ref=e445]: "[51]"
                  - text: 이 4개의 시설은 계속해서 많은 연도에 걸쳐 학계의 주요한 AI연구소, 그리고 자금처로 존재할 것이다.
                  - superscript [ref=e446]:
                    - link "[52]" [ref=e447] [cursor=pointer]:
                      - /url: "#cite_note-52"
                      - generic [ref=e448]: "[52]"
                  - text: "자금은 몇가지 단서와 함께 제공됐다 : ARPA의 기획자 리클리더(J. C. R. Licklider)는 그의 조직은 \"프로젝트가 아니라, 사람에게 투자\"해야 한다고 믿었고, 연구자들이 어떤 방향이든 그들의 관심있는 쪽을 연구하도록 허용했다."
                  - superscript [ref=e449]:
                    - link "[53]" [ref=e450] [cursor=pointer]:
                      - /url: "#cite_note-53"
                      - generic [ref=e451]: "[53]"
                  - text: 이것은 MIT에 자유분방한 분위기를 생성했고 해킹 문화를 탄생
                  - superscript [ref=e452]:
                    - link "[54]" [ref=e453] [cursor=pointer]:
                      - /url: "#cite_note-54"
                      - generic [ref=e454]: "[54]"
                  - text: 시키기도 했다. 그러나 이렇게 손을 떼고 지켜보는 형식의 지원은 얼마 지속되지 못했다.
            - region "AI의 첫번째 암흑기(1974-1980)" [ref=e455]:
              - heading "AI의 첫번째 암흑기(1974-1980)" [level=3] [ref=e457]: AI의 첫번째 암흑기(1974-1980)
              - paragraph [ref=e458]:
                - text: 70년대에 이르자, AI는 비판의 대상이 되었고 재정적 위기가 닥쳤다. AI 연구가들은 그들의 눈앞에 있는 복잡한 문제를 해결하는데 실패했다. 연구가들의 엄청난 낙관론은 연구에 대한 기대를 매우 높여놓았고, 그들이 약속했던 결과를 보여주지 못하자, AI에 대한 자금 투자는 사라져버렸다
                - superscript [ref=e459]:
                  - link "[55]" [ref=e460] [cursor=pointer]:
                    - /url: "#cite_note-55"
                    - generic [ref=e461]: "[55]"
                - text: . 동시에, Connectionism 또는 뉴럴망은 지난 10년동안 마빈 민스키의 퍼셉트론(시각과 뇌의 기능을 모델화한 학습 기계)에 대한 파괴적인 비판에 의해 완전히 중지되었다.
                - superscript [ref=e462]:
                  - link "[56]" [ref=e463] [cursor=pointer]:
                    - /url: "#cite_note-56"
                    - generic [ref=e464]: "[56]"
                - text: 그러나 70년대 후반의 AI에 대한 좋지 않은 대중의 인식에도 불구하고, 논리 프로그래밍, 상징 추론과 많은 여러 영역에서의 새로운 아이디어가 나타났다.
                - superscript [ref=e465]:
                  - link "[57]" [ref=e466] [cursor=pointer]:
                    - /url: "#cite_note-57"
                    - generic [ref=e467]: "[57]"
              - region "문제" [ref=e468]:
                - heading "문제" [level=4] [ref=e470]: 문제
                - paragraph [ref=e471]:
                  - text: 1970년대 초, AI 프로그램의 가능성은 제한적이었다. 모든 문제에 걸쳐서 문제를 푸는 인상 깊은 작품들은 겨우 시험용 버전 정도였고, 어떤 의미에선 '장난감'에 가까웠다.
                  - superscript [ref=e472]:
                    - link "[58]" [ref=e473] [cursor=pointer]:
                      - /url: "#cite_note-58"
                      - generic [ref=e474]: "[58]"
                  - text: AI 연구는 70년대에 더 이상 극복할 수 없는 몇개의 근본적인 한계를 가지게 됐다.몇개의 한계를 통해 십여년 후에 극복되었고, 다른 몇 개는 오늘날까지 남아있다.
                  - superscript [ref=e475]:
                    - link "[59]" [ref=e476] [cursor=pointer]:
                      - /url: "#cite_note-59"
                      - generic [ref=e477]: "[59]"
                - list [ref=e478]:
                  - listitem [ref=e479]:
                    - text: "컴퓨터 능력의 한계 : 정말 유용한 무언가를 이루기에는 메모리 또는 처리 속도가 충분하지 않았다. 예를 들어 로스 퀼리언(Ross Quillian)의 자연어 처리에서 성공적인 완수는 오직 20개의 단어 위에서 발휘되었는데, 이것은 메모리가 꽉 찼기 때문이었다."
                    - superscript [ref=e480]:
                      - link "[60]" [ref=e481] [cursor=pointer]:
                        - /url: "#cite_note-60"
                        - generic [ref=e482]: "[60]"
                    - text: ++한스 모라벡은 1976년에 컴퓨터가 지능을 가지기엔 여전히 수백만 배 약하다고 논증했다. 그는 비유를 들었는데, AI가 컴퓨터 능력을 필요로 하는 것은 항공기가 마력을 필요로 하는 것과 같다는 것이었다. 컴퓨터 영상에 대해서, 모라벡은 간단하게 계산하여 실시간으로 사람의 망막을 모션 캡처하려면 범용 컴퓨터가 초당 10^9 명령어(1000MIPS)를 처리해야 할 것이라고 추측했다
                    - superscript [ref=e483]:
                      - link "[61]" [ref=e484] [cursor=pointer]:
                        - /url: "#cite_note-61"
                        - generic [ref=e485]: "[61]"
                    - text: . 2011년경 실용적인 컴퓨터 영상 프로그램은 10,000~1,000,000 MIPS를 요구한다. 1976년경 5백만에서 8백만 달러사이에 판매되던 가장 빠른 슈퍼컴퓨터인 Cray-1은 오직 80~130 MIPS였고, 당시 전형적인 데스크탑 컴퓨터는 겨우 1 MIPS 남짓이었다.
                  - listitem [ref=e486]:
                    - text: "폭발적인 조합 수와 비용이성 : 1972년에 리차트 카프(Hichard Karp)는 문제 해결에 지수적 시간이 요구되는 많은 문제를 보여주었다. 하찮은 문제일지라도 이런 문제의 최적의 해답을 찾는 데 상상할 수도 없는 컴퓨터의 시간이 요구되었다. 즉 지금까지 AI '장난감'에서 사용되었던 방법은 실제적으로 유용한 AI 시스템을 제작하는 데 용이하지 못했다."
                    - superscript [ref=e487]:
                      - link "[62]" [ref=e488] [cursor=pointer]:
                        - /url: "#cite_note-62"
                        - generic [ref=e489]: "[62]"
                  - listitem [ref=e490]:
                    - text: "상징적 지식과 추론 : 영상 처리나 자연어 처리 같은 많은 중요한 AI 프로그램은 실제 세상에 대한 간단하지만 어마어마한 양의 정보를 필요로 한다. 그래야 프로그램이 자신이 보고 있는 것이 무엇인지, 또는 자신이 듣고 있는 것이 무엇인지 아이디어를 찾을 수 있기 때문이다. 이 요구는 아기들의 세상에 대해 알아나가는 것과 유사하다. 연구가들은 곧 요구되는 정보의 양이 엄청나게 광대하다는 것을 발견했다. 1970년대의 누구도 이런 데이터가 포함된 데이터베이스를 만들지 못했고, 누구도 이런 데이터를 프로그램 혼자 터득하는 방법을 알지 못했다."
                    - superscript [ref=e491]:
                      - link "[63]" [ref=e492] [cursor=pointer]:
                        - /url: "#cite_note-63"
                        - generic [ref=e493]: "[63]"
                  - listitem [ref=e494]:
                    - text: "모라벡의 패러독스 : 이론을 제작하고 기하학적 문제를 해결하는 것은 컴퓨터에게 비교적 쉽지만, 얼굴을 인식하거나 장애물을 피해 방을 가로지르는 것은 엄청나게 어렵다. 이 설명은 왜 연구가들이 1970년대에 영상처리나 로봇에 대해 조금밖에 진전을 보이지 못했는지 아는 데 도움이 된다."
                    - superscript [ref=e495]:
                      - link "[64]" [ref=e496] [cursor=pointer]:
                        - /url: "#cite_note-64"
                        - generic [ref=e497]: "[64]"
                  - listitem [ref=e498]:
                    - text: "프레임 문제, 자격 문제 : 존 맥캐시와 같은 연구가들은 규칙이 규칙 스스로의 구조를 변경하지 못하면 관련 계획 또는 기본 추론 일반 공제를 나타낼 수 없다는 것을 발견했다."
                    - superscript [ref=e499]:
                      - link "[65]" [ref=e500] [cursor=pointer]:

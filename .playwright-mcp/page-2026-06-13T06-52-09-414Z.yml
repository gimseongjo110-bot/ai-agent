                - 'heading "지저분이 : 프레임과 스크립트" [level=4] [ref=e585]': "지저분이 : 프레임과 스크립트"
                - paragraph [ref=e586]:
                  - text: 매카시의 접근에 대한 비평가들의 대다수가 그의 동료인 MIT 소속이었다. 마빈 민스키와 사무엘 페퍼와 로저 샹크는 기계를 사람처럼 느껴지도록 만드는 "이야기 이해"와 "물체 인식"의 문제를 해결하려고 노력했다. "의자"나 "음식점" 같은 일반적인 개념을 사용할 때 사람들은 모두 비논리적으로, 사람들이 통용하는 범용적 가정을 함께 했다. 불행하게도 이런 부정확한 가정들은 논리적 절차로 대표하기가 힘들었다. 제럴드 서스먼(Gerald Sussman)은 "본질적으로 부정확한 개념을 설명하기위 해 정확한 언어를 사용하는 순간 그들은 더 이상 부정확하다고 말할 수 없다"
                  - superscript [ref=e587]:
                    - link "[86]" [ref=e588] [cursor=pointer]:
                      - /url: "#cite_note-86"
                      - generic [ref=e589]: "[86]"
                  - text: 라고 표했다. 또한 섕크는 이에 대해 "비논리적" 접근 즉 "지저분이"가 매카시, 코와스키, 페이젠바움의 "깔끔이" 패러다임과 반대에 있다고 평했다.
                  - superscript [ref=e590]:
                    - link "[87]" [ref=e591] [cursor=pointer]:
                      - /url: "#cite_note-87"
                      - generic [ref=e592]: "[87]"
                - paragraph [ref=e593]:
                  - text: 1975년 세미나 보고서에서, 민스키는 "지저분한" 많은 그의 동료 연구자들이 무언가에 대한 우리의 모든 상식적 가정을 포착하는 프레임워크를 도구로 사용했다고 적었다. 예를 들어 우리가 새라는 개념을 생각할때, 즉시 '난다', '벌레를 먹는다'와 같은 다양한 사실들 또한 떠올린다. 떠올린 것들이 항상 사실은 아니고 또 "논리적"으로 이것들이 공제가 되지는 않는다. 그러나 이런 가정들의 구조는 우리가 말하고 생각하는 문장의 부분을 차지한다. 그는 이 구조를 "프레임"이라 칭했다. 섕크는 프레임의 설명에 대해서 영어로된 짧은 스토리에 대한 답변을 성공적으로 하기 위한 "스크립트"라 불렀다.
                  - superscript [ref=e594]:
                    - link "[88]" [ref=e595] [cursor=pointer]:
                      - /url: "#cite_note-88"
                      - generic [ref=e596]: "[88]"
                  - text: 수년 후 객체지향 프로그래밍에서 AI 연구에서 쓰였던 프레임에서 나온 '상속'이라는 개념을 채택하게 된다.
            - region "AI붐 (1980-1987)" [ref=e597]:
              - heading "AI붐 (1980-1987)" [level=3] [ref=e599]: AI붐 (1980-1987)
              - paragraph [ref=e600]: 1980년대에는 전 세계적으로 사용된 ‘전문가 시스템’이라고 일컫는 인공지능 프로그램의 형태였고 인공지능 검색에 초점이 맞춰졌다. 같은 시기에 일본 정부는 자신들의 5세대 컴퓨터 프로젝트와 인공지능에 적극적으로 투자하였다. 1980년대에 존 홉필드와 데이비드 루멜하트의 신경망 이론의 복원이라는 또 다른 사건이 있었다.
              - region "전문가 시스템의 발전" [ref=e601]:
                - heading "전문가 시스템의 발전" [level=4] [ref=e603]: 전문가 시스템의 발전
                - paragraph [ref=e604]:
                  - text: 전문가 시스템은 특정 지식의 범위에 대해 문제를 해결해주거나 질문에 대답해주는 프로그램이며 전문가의 지식에서 파생된 논리적 법칙을 사용하였다. 최초의 실험은 1965년 Edward Feigenbaum과 레더버그에 의해 Dendral이 시작하였고 이것은 분광계로부터 화합물을 식별하는 실험이었다. MYCIN은 1972년에 개발되었고 전염되는 혈액 질환을 진단하였다. 이러한 접근법(실험)은 타당성이 입증되었다.
                  - superscript [ref=e605]:
                    - link "[89]" [ref=e606] [cursor=pointer]:
                      - /url: "#cite_note-89"
                      - generic [ref=e607]: "[89]"
                - paragraph [ref=e608]:
                  - text: 전문가 시스템은 소규모의 지식 영역에 대해서는 스스로 제한을 둠으로써 상식 문제를 피하였다. 그리고 그들의 단순한 디자인은 프로그램을 만드는 것을 상대적으로 쉽게 하였다. 모든 프로그램은 유용성이 입증되어야 하지만 AI는 이 점을 달성할 수 없었다.
                  - superscript [ref=e609]:
                    - link "[90]" [ref=e610] [cursor=pointer]:
                      - /url: "#cite_note-90"
                      - generic [ref=e611]: "[90]"
                - paragraph [ref=e612]:
                  - text: 1980년, XCON이라 불리는 전문가 시스템은 디지털 장비 회사인 CMU에서 완성되었다. 이 시스템은 매년 4천만 달러를 절약시켜주며 매우 큰 성과를 나타냈다.
                  - superscript [ref=e613]:
                    - link "[91]" [ref=e614] [cursor=pointer]:
                      - /url: "#cite_note-91"
                      - generic [ref=e615]: "[91]"
                  - text: 전 세계의 회사들은 1985년에 1억 달러 이상을 AI에 사용하여 이를 개발하고 전문가 시스템을 배포하였다. Symbolics, Lisp Machines과 같은 하드웨어 회사와 IntelliCorp, Aion 등의 소프트웨어 회사들이 이를 지원하면서 같이 성장하였다.
                  - superscript [ref=e616]:
                    - link "[92]" [ref=e617] [cursor=pointer]:
                      - /url: "#cite_note-92"
                      - generic [ref=e618]: "[92]"
              - region "지식 혁명" [ref=e619]:
                - heading "지식 혁명" [level=4] [ref=e621]: 지식 혁명
                - paragraph [ref=e622]:
                  - text: 전문가 지식들을 포함하면서 전문가 시스템의 힘은 두각을 나타내었다. 이것은 1970년대 내내 연구하였던 AI 연구 기법의 새로운 방향 중 일부분이었다. “AI 과학자들은 지능이란 것이 다른 방법들로 많은 양의 다양한 지식들을 사용하는 능력에 기반한 것이라고 의심하기 시작했다.”
                  - superscript [ref=e623]:
                    - link "[93]" [ref=e624] [cursor=pointer]:
                      - /url: "#cite_note-93"
                      - generic [ref=e625]: "[93]"
                  - text: 지식 기반 시스템과 지식 엔지니어링은 1980년대 AI 연구자들의 메인 포커스가 되었다.
                  - superscript [ref=e626]:
                    - link "[94]" [ref=e627] [cursor=pointer]:
                      - /url: "#cite_note-94"
                      - generic [ref=e628]: "[94]"
                - paragraph [ref=e629]:
                  - text: 또한 1980년대에는 일반인들이 모두 알 만한 일상적인 사실들을 모두 포함한 아주 거대한 데이터베이스를 만들어 상식 문제에 대한 직접적 해결을 시도한 Cyc의 탄생을 볼 수 있었다. 이 프로젝트를 이끈 Douglas Lenat는 지름길은 없다고 말했다. - 기계가 인간의 개념을 알게 하기 위한 단 한 가지 길은 그들을 가르치는 것이다. 이 프로젝트는 수 십 년 동안 완료될 것이라 생각되지 않았다.
                  - superscript [ref=e630]:
                    - link "[95]" [ref=e631] [cursor=pointer]:
                      - /url: "#cite_note-95"
                      - generic [ref=e632]: "[95]"
              - 'region "돈은 되돌아온다 : 5세대 프로젝트" [ref=e633]':
                - 'heading "돈은 되돌아온다 : 5세대 프로젝트" [level=4] [ref=e635]': "돈은 되돌아온다 : 5세대 프로젝트"
                - paragraph [ref=e636]:
                  - text: 1981년, 일본의 국제 무역과 산업 부서는 5세대 컴퓨터 프로젝트를 위해 8억 5천만 달러를 확보해 두었다. 그들의 목적은 기계가 사람처럼 프로그램을 작성하고 대화를 수행할 수 있는 시스템과 언어를 번역하거나 그림을 해석하는 것이었다. 그들은 프로젝트를 위해 기본 컴퓨터 언어로 Prolog를 선택하였다.
                  - superscript [ref=e637]:
                    - link "[96]" [ref=e638] [cursor=pointer]:
                      - /url: "#cite_note-96"
                      - generic [ref=e639]: "[96]"
                - paragraph [ref=e640]:
                  - text: 다른 나라들은 그들만의 고유한 프로그램을 개발하였다. UK는 3억 5천만 달러를 들여 Alvey 프로젝트를 시작했다. 미국 회사들의 컨소시엄은 정보기술과 AI안의 거대한 프로젝트를 투자받기 위해 마이크로 전자공학과 컴퓨터 기술 협력이라는 형태를 취했다.
                  - superscript [ref=e641]:
                    - link "[97]" [ref=e642] [cursor=pointer]:
                      - /url: "#cite_note-97"
                      - generic [ref=e643]: "[97]"
                  - superscript [ref=e644]:
                    - link "[98]" [ref=e645] [cursor=pointer]:
                      - /url: "#cite_note-98"
                      - generic [ref=e646]: "[98]"
                  - text: 또한 1984에서 1988년 사이에 DARPA는 전략적 컴퓨팅 계획을 설립하고 AI에 대한 투자를 세배로 늘렸다.
                  - superscript [ref=e647]:
                    - link "[99]" [ref=e648] [cursor=pointer]:
                      - /url: "#cite_note-99"
                      - generic [ref=e649]: "[99]"
              - region "신경망 이론의 복귀" [ref=e650]:
                - heading "신경망 이론의 복귀" [level=4] [ref=e652]: 신경망 이론의 복귀
                - paragraph [ref=e653]:
                  - text: 1982년, 물리학자 John Hopfield는 (현재 ‘Hopfield net’이라고 불리는) 완벽한 새로운 길에서 정보를 프로세스하고 배울 수 있는 신경망의 형태를 증명해냈다. 이 시기에, David Rumelhart는 (Paul Werbos에 의해 발견된) “역전파”라고 불리는 신경망을 개선하기 위한 새로운 방법을 알리고 있었다. 이러한 두 가지 발견은 1970년 이후 버려진 신경망 이론이라는 분야를 복구시켰다.
                  - superscript [ref=e654]:
                    - link "[100]" [ref=e655] [cursor=pointer]:
                      - /url: "#cite_note-100"
                      - generic [ref=e656]: "[100]"
                  - superscript [ref=e657]:
                    - link "[101]" [ref=e658] [cursor=pointer]:
                      - /url: "#cite_note-101"
                      - generic [ref=e659]: "[101]"
                  - text: 새로운 분야는 1986년 분산 병렬처리의 형태로부터 영감을 받았고 이와 같은 형태로 통일되었다. 2권 분량의 논문 집합은 Rumelhart와 물리학자인 James McClelland에 의해 편집되었다. 신경망은 1990년대에 광학 문자 인식 및 음성 인식과 같은 프로그램의 구동 엔진으로 사용되며 상업적으로 성공했다.
                  - superscript [ref=e660]:
                    - link "[102]" [ref=e661] [cursor=pointer]:
                      - /url: "#cite_note-102"
                      - generic [ref=e662]: "[102]"
                  - superscript [ref=e663]:
                    - link "[103]" [ref=e664] [cursor=pointer]:
                      - /url: "#cite_note-103"
                      - generic [ref=e665]: "[103]"
            - region "AI의 두번째 암흑기 1987-1993" [ref=e666]:
              - heading "AI의 두번째 암흑기 1987-1993" [level=3] [ref=e668]: AI의 두번째 암흑기 1987-1993
              - paragraph [ref=e669]: AI와 비즈니스 커뮤니티의 매력은 상실했고 경제 거품이라는 고전적 형태의 1980년대에 빠졌다. 붕괴는 정부기관과 투자자들의 ‘해당 분야는 계속해서 비판에도 불구하고 진보해왔다.’는 인식에 비롯된 것이었다. 로봇 공학 분야에 관련 된 연구원인 Rodney Brooks 와 Hans Moravec는 인공지능에 대한 완전히 새로운 접근 방식을 주장하였다.
              - region "인공지능의 겨울" [ref=e670]:
                - heading "인공지능의 겨울" [level=4] [ref=e672]: 인공지능의 겨울
                - paragraph [ref=e673]:
                  - text: 1974년에 전문가 시스템에 대한 열정이 통제할 수 없을 정도로 퍼져나가고 이에 대한 실망이 확실히 따라올 것이라는 걱정이 있었고 이 때 투자가 끊기고 살아남은 연구원들에 의해서 “AI winter”이라는 단어가 만들어졌다.
                  - superscript [ref=e674]:
                    - link "[104]" [ref=e675] [cursor=pointer]:
                      - /url: "#cite_note-104"
                      - generic [ref=e676]: "[104]"
                  - text: 그들의 두려움은 AI에 대해 일련의 재정적 차질이 있었던 1980년 말에서 1990년대 초반에 잘 나타난다. 이 AI winter 기간의 첫 번째 사건은 1987년에 특성화된 AI 하드웨어 시장이 갑자기 무너진 것이다. 1987년에 애플이나 IBM의 데스크탑 컴퓨터들은 급격히 빨라지고 성능이 좋아졌다. 또한 Symblics과 기타 회사들이 만든 데스크탑 컴퓨터 보다 더 비싼 Lisp 기기들보다도 더욱 좋은 성능을 나타냈다. 즉, 더 이상 Lisp 기기들을 살 이유가 사라진 것이다. 전체산업 1억 달러의 절반의 가치가 하룻밤에 사라졌다.
                  - superscript [ref=e677]:
                    - link "[105]" [ref=e678] [cursor=pointer]:
                      - /url: "#cite_note-105"
                      - generic [ref=e679]: "[105]"
                  - text: 결국 최초의 성공한 전문가 시스템인 XCON은 유지하기에 너무 비싸다는 것이 증명되었다. 업데이트하기에도 너무 어려웠고 학습도 되지 않았다. 이 전문가 시스템은 또한 일반적이지 않은 질문을 했을 때 괴상한 행동을 하는 일명 "brittle" 이었고 그들은 일찍이 발견된 이러한 문제들에 의해 결국 희생되었다. 전문가 시스템은 특별한 경우에서만 유용할 뿐이었다.
                  - superscript [ref=e680]:
                    - link "[106]" [ref=e681] [cursor=pointer]:
                      - /url: "#cite_note-106"
                      - generic [ref=e682]: "[106]"
                  - text: 1980년대 후반, Strategic Computing initiative는 AI의 투자를 자르는 데 공이 컸다. DARPA의 새로운 리더쉽은 AI는 이 다음의 파도가 아니라고 결정했고 즉각적인 결과를 나타낼 수 있는 것으로 보이는 프로젝트에 직접적인 투자를 하는 방향으로 결정했다.
                  - superscript [ref=e683]:
                    - link "[107]" [ref=e684] [cursor=pointer]:
                      - /url: "#cite_note-107"
                      - generic [ref=e685]: "[107]"
                  - text: 1991년에는 1981년에 일본에서 5세대 프로젝트의 목표 리스트에 적은 것만큼 성과가 나오지 않았다. 실제로 대화를 계속 이어나가는 것과 같은 어떤 것들은 2010년까지 달성되지 않았다. 다른 인공 지능 프로젝트와 마찬가지로, 실제 가능했던 것보다 기대가 훨씬 컸다.
                  - superscript [ref=e686]:
                    - link "[108]" [ref=e687] [cursor=pointer]:
                      - /url: "#cite_note-108"
                      - generic [ref=e688]: "[108]"
              - 'region "몸통을 갖는 것의 중요성: Nouvellle AI and embodied reason" [ref=e689]':
                - 'heading "몸통을 갖는 것의 중요성: Nouvellle AI and embodied reason" [level=4] [ref=e691]': "몸통을 갖는 것의 중요성: Nouvellle AI and embodied reason"
                - paragraph [ref=e692]:
                  - text: 1980년대 후반 , 몇몇 연구원들이 로봇 공학을 기반으로 인공 지능에 완전히 새로운 접근법에 대해 찬성하였다.
                  - superscript [ref=e693]:
                    - link "[109]" [ref=e694] [cursor=pointer]:
                      - /url: "#cite_note-109"
                      - generic [ref=e695]: "[109]"
                  - text: 그들은 실제 지능을 보여주려면 기계에도 몸통이 필요하다고 믿었다. - 기계 또한 이 세상에서 인식하고, 이동하고, 살아남고 거래할 줄 알 필요가 있다. 그들은 이런 감각 운동 기술은 상식적인 추론과 같은 더 높은 단계의 기술이 필요하다고 말했고 실제로 추상적인 추론은 인간의 가장 흥미롭거나 중요한 기술이다. 그들은 지능을 바닥에서부터 지어야 한다고 내세웠다.
                  - superscript [ref=e696]:
                    - link "[110]" [ref=e697] [cursor=pointer]:
                      - /url: "#cite_note-110"
                      - generic [ref=e698]: "[110]"
                  - text: 인공 두뇌와 제어 이론에서부터 얻은 접근법은 1960년대까지 인기가 없었다. 또 다른 선구자인 David Marr는 신경 과학 이론으로 한 그룹의 비전을 이끌어 성공적인 배경으로 1970년대에 MIT에 들어왔다. 그는 모든 상식적인 접근법(McCarthy's logic and Minsky's frames)을 거절했고 AI는 시각에 대한 육체적인 기계장치를 심볼릭 프로세싱 하기 전에 가장 바닥에서부터 위로 이해할 필요가 있다고 말했다.
                  - superscript [ref=e699]:
                    - link "[111]" [ref=e700] [cursor=pointer]:
                      - /url: "#cite_note-111"
                      - generic [ref=e701]: "[111]"
                - paragraph [ref=e702]:
                  - text: 1990년에 Elephants Don't Play Chess 논문에서, 로봇 공학 연구자인 Rodney Brooks는 직접적으로 물리적 심볼 시스템 가설에 초점을 맞추었고 심볼들은 항상 필요한 것은 아니라고 말했다. “세계는 그 자체만으로 가장 훌륭한 모델이다. 이것은 항상 최신이며 모든 세부사항이 존재한다. 비결은 적절히 그리고 충분히 자주 감지하는 것이다.
                  - superscript [ref=e703]:
                    - link "[112]" [ref=e704] [cursor=pointer]:
                      - /url: "#cite_note-112"
                      - generic [ref=e705]: "[112]"
                  - text: 80년대와 90년대에 많은 cognitive 과학자들은 또한 사고방식의 심볼 처리 모델을 거절하고 추론에 몸통은 필수적이라고 말했고 이러한 이론을 embodied mind 이론이라고 불렀다.
                  - superscript [ref=e706]:
                    - link "[113]" [ref=e707] [cursor=pointer]:
                      - /url: "#cite_note-113"
                      - generic [ref=e708]: "[113]"
            - region "AI 1993~현재" [ref=e709]:
              - heading "AI 1993~현재" [level=3] [ref=e711]: AI 1993~현재
              - paragraph [ref=e712]:
                - text: 지금보다 반세기는 더 오래된 AI의 분야는 마침내 가장 오래된 목표 중 몇 가지를 달성했다. 이것은 비록 뒷받침해주는 역할이었지만 기술 산업에 걸쳐 성공적으로 사용되었다. 몇 가지 성공은 컴퓨터의 성능이 증가했기 때문이고 또 다른 몇 가지는 고립된 문제들에 대해 집중하였고 높은 과학적 의무감으로 해 나갔기 때문에 해결되었다. 적어도 비즈니스 분야에서의 AI의 평판은 여전히 처음 같지 않다. 이 분야 내에서는 1960년대 세계의 상상이던 인간 수준의 지능의 꿈을 실현하는 것이 실패로 돌아갔다는 이유로 몇 가지 합의를 하였다. 하위 파트에서 AI의 일부분을 도와주던 모든 요소들은 특정 문제나 접근 방식에 초점이 맞추어졌다.
                - superscript [ref=e713]:
                  - link "[114]" [ref=e714] [cursor=pointer]:
                    - /url: "#cite_note-114"
                    - generic [ref=e715]: "[114]"
                - text: 그 후, AI는 여태 해왔던 것보다 더욱 신중해졌고 더욱 성공적이였다. 또한 보안이 중요한 이슈로 떠올랐다. 인공지능의 보안이슈로는 학습된 인공지능을 속일 수 있는 공격형태인 Poisoning Attack, Evasion Attack, 인공지능 모델 자체를 탈취할 수 있는 Model Extraction Attack, 학습된 모델에서 데이터를 추출해내는 Inversion Attack 등이 있다.
                - superscript [ref=e716]:
                  - link "[115]" [ref=e717] [cursor=pointer]:
                    - /url: "#cite_note-115"
                    - generic [ref=e718]: "[115]"
              - region "성공 사례와 무어의 법칙" [ref=e719]:
                - heading "성공 사례와 무어의 법칙" [level=4] [ref=e721]: 성공 사례와 무어의 법칙
                - paragraph [ref=e722]:
                  - text: 1997년 5월 11일,
                  - link "딥 블루" [ref=e723] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/딥_블루
                  - text: 는 당시
                  - link "체스" [ref=e724] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/체스
                  - text: 세계 챔피언이던
                  - link "가리 카스파로프" [ref=e725] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/가리_카스파로프
                  - text: 를 이긴 최초의 체스 플레이 컴퓨터가 되었다.
                  - superscript [ref=e726]:
                    - link "[116]" [ref=e727] [cursor=pointer]:
                      - /url: "#cite_note-116"
                      - generic [ref=e728]: "[116]"
                  - text: 2005년 스탠퍼드의 로봇은 DARPA 그랜드 챌린지에서 연습해 보지 않은 사막 도로 131마일을 자동으로 운전하여 우승하였다.
                  - superscript [ref=e729]:
                    - link "[117]" [ref=e730] [cursor=pointer]:
                      - /url: "#cite_note-117"
                      - generic [ref=e731]: "[117]"
                  - text: 2년 뒤, CMU의 한 팀은 DARPA 도시 챌린지에서 모든 교통 법규를 지키고 교통 혼잡 속에서 자동으로 55 마일의 길을 찾았다.
                  - superscript [ref=e732]:
                    - link "[118]" [ref=e733] [cursor=pointer]:
                      - /url: "#cite_note-118"
                      - generic [ref=e734]: "[118]"
                  - text: 2011년 2월, 퀴즈 쇼
                  - link "Jeopardy!" [ref=e735] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/Jeopardy!
                  - text: 에 출전한 IBM의 응답 시스템 왓슨은 상당히 여유롭게 두 챔피언을 이겼다.
                  - superscript [ref=e736]:
                    - link "[119]" [ref=e737] [cursor=pointer]:
                      - /url: "#cite_note-119"
                      - generic [ref=e738]: "[119]"
                - paragraph [ref=e739]:
                  - text: 이러한 성공은 혁신적인 새로운 패러다임 때문이 아니라 번거로운 엔지니어 스킬과 매우 뛰어난 성능을 가진 오늘날의 컴퓨터에서 비롯된 것이다.
                  - superscript [ref=e740]:
                    - link "[120]" [ref=e741] [cursor=pointer]:
                      - /url: "#cite_note-120"
                      - generic [ref=e742]: "[120]"
                  - text: 실제로, Deep Blue의 컴퓨터는 1951년 Christopher가 체스 하는 법을 가르친 마크 1보다 1천만 배 빨랐다.
                  - superscript [ref=e743]:
                    - link "[121]" [ref=e744] [cursor=pointer]:
                      - /url: "#cite_note-121"
                      - generic [ref=e745]: "[121]"
                  - text: 이 엄청난 증가는
                  - link "무어의 법칙" [ref=e746] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/무어의_법칙
                  - text: 에 의해 측정되는데 이것은 2년마다 컴퓨터의 메모리 속도와 양은 두 배씩 늘어난다는 이론이다. 최초 컴퓨터 성능의 근본적인 문제는 느리지만 서서히 극복되고 있었다.
              - region "지능형 에이전트" [ref=e747]:
                - heading "지능형 에이전트" [level=4] [ref=e749]: 지능형 에이전트
                - paragraph [ref=e750]:
                  - text: 1990년대 동안에는 ‘
                  - link "지능형 에이전트" [ref=e751] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/지능형_에이전트
                  - text: ’라고 불리는 새로운 패러다임이 다 방면에서 수용되고 있었다.
                  - superscript [ref=e752]:
                    - link "[122]" [ref=e753] [cursor=pointer]:
                      - /url: "#cite_note-122"
                      - generic [ref=e754]: "[122]"
                  - text: 비록 이전의 연구자들은 'divide and conquer' 모듈러를 제안하고 AI에 접근하였지만
                  - superscript [ref=e755]:
                    - link "[123]" [ref=e756] [cursor=pointer]:
                      - /url: "#cite_note-123"
                      - generic [ref=e757]: "[123]"
                  - text: 지능형 에이전트는 Judea Pearl, Allen Newell 등 다른 이들이 AI를 연구하는데 있어서 결정론과 경제성이라는 개념을 가져오기 전까지 현대식 형태를 갖추지 못했다.
                  - superscript [ref=e758]:
                    - link "[124]" [ref=e759] [cursor=pointer]:
                      - /url: "#cite_note-124"
                      - generic [ref=e760]: "[124]"
                  - text: 경제학자들의 합리적 에이전트라는 정의와 컴퓨터 과학자들의 객체 혹은 모듈러 정의가 합쳐졌을 때 지능형 에이전트의 패러다임이 완성되었다.
                - paragraph [ref=e761]:
                  - text: 지능형 에이전트 시스템은 환경을 인식하고 성공을 가장 극대화할 수 있는 행동을 취한다. 이러한 정의에 의하면 인간과 인간의 조직처럼, 예를 들어 회사처럼 특정 문제를 해결하는 간단한 프로그램을 지능형 에이전트라고 한다. 지능형 에이전트는 AI 연구자를 “the study of intelligent agents"로 정의한다. 이것은 AI의 정의의 일부를 일반화한 것이다. 이것은 인간의 지능을 넘어 모든 종류의 지능의 연구를 추구한다.
                  - superscript [ref=e762]:
                    - link "[125]" [ref=e763] [cursor=pointer]:
                      - /url: "#cite_note-125"
                      - generic [ref=e764]: "[125]"
                - paragraph [ref=e765]:
                  - text: 이러한 패러다임은 당시 연구자들이 고립 문제에 대해 연구하고 다양하고 유용한 해결법을 찾도록 해주었다. 또한 서로서로 문제와 해결책을 공통의 언어로 표현하였고 추상적 에이전트를 사용한 경제학이나 제어 이론 등과 같은 다른 개념에도 사용되었다. 어떤 연구자들은 지능형 에이전트의 상호 작용에서 더 다양하고 지능적인 시스템을 만들기로 하였고 완전한 에이전트 아키텍처가 되기를 바랐다.
                  - superscript [ref=e766]:
                    - link "[126]" [ref=e767] [cursor=pointer]:
                      - /url: "#cite_note-126"
                      - generic [ref=e768]: "[126]"
                  - text: 이것이 21세기의 보편적인 교과서들이 인공 지능을 정의하는 방식이다.
                  - superscript [ref=e769]:
                    - link "[127]" [ref=e770] [cursor=pointer]:
                      - /url: "#cite_note-127"
                      - generic [ref=e771]: "[127]"
                  - superscript [ref=e772]:
                    - link "[128]" [ref=e773] [cursor=pointer]:
                      - /url: "#cite_note-128"
                      - generic [ref=e774]: "[128]"
              - region "깔끔함의 승리" [ref=e775]:
                - heading "깔끔함의 승리" [level=4] [ref=e777]: 깔끔함의 승리
                - paragraph [ref=e778]:
                  - text: AI 연구자는 과거에 사용했던 것보다 더욱 정교한 수학적 도구를 사용하여 개발하기 시작했다.
                  - superscript [ref=e779]:
                    - link "[129]" [ref=e780] [cursor=pointer]:
                      - /url: "#cite_note-129"
                      - generic [ref=e781]: "[129]"
                  - text: 해결하는 데 AI가 필요한 수많은 문제들이 존재하고 있다는 인식은 수학, 경제학 또는 오퍼레이션 연구 등의 분야에서 이미 연구자들이 AI를 사용하여 실현하고 있었다. 공유된 수학적 언어는 높은 수준의 협력, 좋은 평판, 여러 분야를 성공적으로 이끌고 측정과 증명이 된 결과들의 성취를 가능하게 하였다. AI는 더 엄격한 과학 학문이 되었다.
                - paragraph [ref=e782]:
                  - text: 이는 혁명 그 자체였으며 "깔끔함"의 승리였다.
                  - superscript [ref=e783]:
                    - link "[130]" [ref=e784] [cursor=pointer]:
                      - /url: "#cite_note-130"
                      - generic [ref=e785]: "[130]"
                  - superscript [ref=e786]:
                    - link "[131]" [ref=e787] [cursor=pointer]:
                      - /url: "#cite_note-131"
                      - generic [ref=e788]: "[131]"
                  - text: Judea Pearl의 매우 영향이 큰 1988년 책은 AI에 결정론과 확률을 대입시켰다.
                  - superscript [ref=e789]:
                    - link "[132]" [ref=e790] [cursor=pointer]:
                      - /url: "#cite_note-132"
                      - generic [ref=e791]: "[132]"
                  - text: 사용 중인 많은 새로운 도구(Bayesian networks, hidden Markov models, information theory, stochastic modeling)와 기존의 고전적이 방법들이 최적화되었다. 더 정밀한 수학적 모형이 신경망 네트워크와 진화 알고리즘과 같은 연산 지능적 패러다임을 위해 개발되었다.
                  - superscript [ref=e792]:
                    - link "[133]" [ref=e793] [cursor=pointer]:
                      - /url: "#cite_note-133"
                      - generic [ref=e794]: "[133]"
              - region "조용한 발전" [ref=e795]:
                - heading "조용한 발전" [level=4] [ref=e797]: 조용한 발전
                - paragraph [ref=e798]:
                  - text: AI 연구자들에 의해 최초로 개발된 알고리즘은 거대한 시스템의 일부로 나타나기 시작했다. AI는 매우 어려운 문제
                  - superscript [ref=e799]:
                    - link "[134]" [ref=e800] [cursor=pointer]:
                      - /url: "#cite_note-134"
                      - generic [ref=e801]: "[134]"
                  - text: 들을 해결했고 데이터 마이닝, 산업 로봇공학, 논리학
                  - superscript [ref=e802]:
                    - link "[135]" [ref=e803] [cursor=pointer]:
                      - /url: "#cite_note-135"
                      - generic [ref=e804]: "[135]"
                  - text: ", 음성 인식"
                  - superscript [ref=e805]:
                    - link "[136]" [ref=e806] [cursor=pointer]:
                      - /url: "#cite_note-136"
                      - generic [ref=e807]: "[136]"
                  - text: ", 은행 소프트웨어,"
                  - superscript [ref=e808]:
                    - link "[137]" [ref=e809] [cursor=pointer]:
                      - /url: "#cite_note-137"
                      - generic [ref=e810]: "[137]"
                  - text: 의학적 진단, 구글 검색 엔진
                  - superscript [ref=e811]:
                    - link "[138]" [ref=e812] [cursor=pointer]:
                      - /url: "#cite_note-138"
                      - generic [ref=e813]: "[138]"
                  - text: 등 여러 기술들은 기술 산업
                  - superscript [ref=e814]:
                    - link "[139]" [ref=e815] [cursor=pointer]:
                      - /url: "#cite_note-139"
                      - generic [ref=e816]: "[139]"
                  - text: 에 매우 유용하다는 것이 증명되었다.
                - paragraph [ref=e817]:
                  - text: AI 분야는 이러한 성공에 대해 매우 낮은 신뢰를 받았다. AI의 훌륭한 혁신 중 대부분은 컴퓨터 과학의 도구에서 또 다른 기능으로 세분화되었다.
                  - superscript [ref=e818]:
                    - link "[140]" [ref=e819] [cursor=pointer]:
                      - /url: "#cite_note-140"
                      - generic [ref=e820]: "[140]"
                  - text: 닉 보스트롬은 "많은 최첨단 AI가 일반 응용 부문으로 필터링되었으며, AI라고 불리지 않는 경우가 많다. 일단 무언가가 충분히 유용하고 일반적이게 되면 더 이상 AI라는 라벨이 붙지 않기 때문이다."라고 말했다.
                  - superscript [ref=e821]:
                    - link "[141]" [ref=e822] [cursor=pointer]:
                      - /url: "#cite_note-141"
                      - generic [ref=e823]: "[141]"
                  - text: 1990년대 AI 분야의 많은 연구자들이 고의로 자신의 프로젝트를 다른 이름으로 불렀다. 일부 이러한 현상은 그들의 분야가 AI와 근본적으로 다르다고 여겼기 때문이거나 또는 새로운 이름이 투자받기 쉬웠기 때문일 것이라고 한다. 적어도 상업 분야에서는 연구자에 대해
                  - link "AI 겨울" [ref=e824] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/AI_겨울
                  - text: 에 있었던 실패했던 계약이 꼬리표처럼 따라다녔고 2005년에 뉴욕 타임즈에서는 “컴퓨터과학과 소프트웨어 엔지니어들은 광기에 싸인 몽상가처럼 보일 두려움 때문에 인공 지능이란 용어를 피했다.” 라고 소개되었다.

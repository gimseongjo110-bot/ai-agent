              - region "인공지능과 4차 산업혁명" [ref=e861]:
                - heading "인공지능과 4차 산업혁명" [level=4] [ref=e863]: 인공지능과 4차 산업혁명
                - paragraph [ref=e864]:
                  - text: 세계는 이미 4차 산업혁명에 진입했으며 인공지능은 빠르게 인간을 대체해 나갈 것이다. 또, 널리 퍼져 있지 않을 뿐 미래는 이미 와 있으며 인공지능, IoT, 클라우드 컴퓨팅, 빅데이터 등이 융합되면서 4차 산업혁명이 발생하고 있다. 과거 산업혁명이 ‘기계근육’을 만드는 과정이었다면 4차 혁명에서는 ‘기계두뇌’가 탄생할 것이다.
                  - superscript [ref=e865]:
                    - link "[150]" [ref=e866] [cursor=pointer]:
                      - /url: "#cite_note-150"
                      - generic [ref=e867]: "[150]"
                - paragraph [ref=e868]:
                  - text: 제1차 산업혁명 발생시, 산업 기계에 의해 일자리를 잃을 것이 두려웠던 노동자들이
                  - link "러다이트" [ref=e869] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/러다이트
                  - text: (기계파괴운동)를 일으켰다. 이와 유사하게, 인공 지능에 의한 4차 산업혁명으로, 많은 사람들이 미래에 일자리를 잃을 것을 우려하고 있다. 한 온라인 설문조사

                - paragraph [ref=e561]:
                  - text: 논리적 추론은 1958년 초에 AI 연구에서 존 매카시가 제안하여 도입되었다.
                  - superscript [ref=e562]:
                    - link "[80]" [ref=e563] [cursor=pointer]:
                      - /url: "#cite_note-80"
                      - generic [ref=e564]: "[80]"
                  - text: 1963년 알렌 로빈슨(J. Alan Robinson)은 간단하게 추론을 컴퓨터에 구현시키는 분해와 통일 알고리즘을 발견했다. 그러나 매카시와 그의 학생들이 60년대 후반에 했던 것과 같은 복잡하지 않은 구현은 본질적으로 다루기 힘들었는데, 간단한 정리를 증명하기 위해 천문학적 단계가 필요했다.
                  - superscript [ref=e565]:
                    - link "[81]" [ref=e566] [cursor=pointer]:
                      - /url: "#cite_note-81"
                      - generic [ref=e567]: "[81]"
                  - text: 더 성공적인 결실을 맺는 논리적 접근은 70년대 에딘벌 대학의 로버트 코왈스키(Robert Kowalski)가 개발했고 곧 프랑스의 연구가인 알라인 콜메루엘(Alain Colmerauer)과 성공적인 논리 프로그래밍 언어인 프롤로그를 만든 필립 오우셀(Philippe Roussel)과의 협업을 이끌어냈다.
                  - superscript [ref=e568]:
                    - link "[82]" [ref=e569] [cursor=pointer]:
                      - /url: "#cite_note-82"
                      - generic [ref=e570]: "[82]"
                  - text: 프롤로그는 다루기 쉬운 계산을 허용하는 논리의 부분을 사용한다. 규칙은 계속적으로 영향을 미쳤고, 에드워트 페이젠바움(Edward Feigenbaum)이 기대하던 시스템 기초를 제공했으며 알렌 뉴엘과 허버트가 계속 연구하도록 만들었다. 사이먼은 Soar과 인식에서의 통일 이론을 이끌었다.

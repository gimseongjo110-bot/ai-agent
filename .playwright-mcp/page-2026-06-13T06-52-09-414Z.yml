              - paragraph [ref=e961]: 어떤 사람들은 현재 알려진 어떤 시스템보다도 지능적이며 복잡한 시스템의 등장을 예견하기도 한다. 이와 같은 가상적인 시스템들을 '비결정적인 인공지능 시스템'의 약자인 atilect라고 한다. 이와 같은 시스템이 만들어진다면 그동안 인류에게 문제시되지 않았던 많은 윤리적인 문제들이 발생하게 된다.
              - paragraph [ref=e962]: 이에 대한 토론은 시간이 흐름에 따라 '가능성'보다는 '의도'에 점점 초점을 맞추게 되었다. 이러한 초점의 이동은 휴고 더개리스(Hugo de Garis)와 케빈 워릭(Kevin Warwick)에 의해 제기된 "Cosmist"(반대말은 "Terran") 논쟁에 의해 이루어졌다. 더개리스에 따르면 Cosmist란 더욱 지능적인 종족을 인간의 후계종으로 만들어 내기 위해 노력한다. 이러한 논의로 미루어 볼 때, '의도'의 문제가 초기 인공지능 "반대파"들에게 큰 문제였음을 알 수 있다.
              - paragraph [ref=e963]: 흥미로운 윤리적 문제를 제기하는 주제는 다음과 같다.
              - list [ref=e964]:

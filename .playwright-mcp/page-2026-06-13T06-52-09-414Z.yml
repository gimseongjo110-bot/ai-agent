                      - generic [ref=e573]: "[83]"
                  - text: 논리적으로의 접근을 비판하는 지적은, 드라이퍼스가 했던대로, 사람이 문제를 해결할 때 논리를 거의 사용하지 않는다는 것이었다. 피터 왓슨(Peter Waon),

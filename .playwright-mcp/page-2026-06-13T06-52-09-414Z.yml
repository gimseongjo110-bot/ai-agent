                        - generic [ref=e501]: "[65]"
              - region "자금 지원의 중단" [ref=e502]:
                - heading "자금 지원의 중단" [level=4] [ref=e504]: 자금 지원의 중단
                - paragraph [ref=e505]:
                  - text: 영국 정보나 DARPA, NRC같은 AI 연구자들에게 자금을 주던 기관들은 연구 진행의 부진에 실망했고 결국 AI에 관한 방향성을 가진 자금 지원을 끊었다. 1966년 기계를 이용한 번역을 비판하는 보고서가 ALPAC에 제출되었을 때부터 이런 흐름이 시작되었다. 총 2천만 달러를 지원한 NRC도 지원을 멈췄다.
                  - superscript [ref=e506]:
                    - link "[66]" [ref=e507] [cursor=pointer]:
                      - /url: "#cite_note-66"
                      - generic [ref=e508]: "[66]"
                  - text: 1973년 라이트힐 보고서는 "장대한 목표(grandios objectives)"를 성취하는 데 실패한 영국의 AI 연구의 상태에 대해 비난했고 결국 영국의 AI 연구소는 해체되었다(보고서는 특히 AI 연구의 실패의 원인이 폭발적인 조합의 수라고 언급했다
                  - superscript [ref=e509]:
                    - link "[67]" [ref=e510] [cursor=pointer]:
                      - /url: "#cite_note-67"
                      - generic [ref=e511]: "[67]"
                  - text: ).
                  - superscript [ref=e512]:
                    - link "[68]" [ref=e513] [cursor=pointer]:
                      - /url: "#cite_note-68"
                      - generic [ref=e514]: "[68]"
                  - text: DARPA는 CMU의 음성을 이해하는 연구의 연구자들에게 심하게 실망했고 연간 3백만 달러의 지원을 취소했다.
                  - superscript [ref=e515]:
                    - link "[69]" [ref=e516] [cursor=pointer]:
                      - /url: "#cite_note-69"
                      - generic [ref=e517]: "[69]"
                  - text: 1974년에 이르자 AI 연구에대한 투자는 찾기 어려워졌다. 한스 모라벡은 그의 동료의 비현실적인 예측에 의한 위기를 비난했다. "많은 연구가들이 많은 연구자는 과장을 증가시키는 웹에 휘말렸다."
                  - superscript [ref=e518]:
                    - link "[70]" [ref=e519] [cursor=pointer]:
                      - /url: "#cite_note-70"
                      - generic [ref=e520]: "[70]"
                  - text: "그러나 여기엔 다른 이슈가 있다 : 1969년 맨스필드의 수정안의 통과이후, DARPA는 자금 지원에 대해 \"비직접적인 기초 연구보다, 임무 완수에 직결된 연구\"를 수행하라는 증가하는 압력을 받고 있었다. 창조성 높은 지원, 자유분방한 연구는 1960년대와 함께 떠났고 DARPA에서 다시 오지 않을 것이다. 대신, 자금은 자동조정 탱크나 전투 관리 시스템과 같은 분명한 프로젝트와 명확한 목표를 향할 것이다."
                  - superscript [ref=e521]:

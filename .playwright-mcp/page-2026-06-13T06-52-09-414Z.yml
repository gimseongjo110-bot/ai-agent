            - region "실험적인 AI 연구" [ref=e873]:
              - heading "실험적인 AI 연구" [level=3] [ref=e875]: 실험적인 AI 연구
              - paragraph [ref=e876]:
                - text: 인공지능은
                - link "1959년" [ref=e877] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/1959년
                - text: 에
                - link "MIT" [ref=e878] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/MIT
                - text: AI연구소를 설립한 매카시와 마빈 민스키,
                - link "카네기멜론 대학교" [ref=e879] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/카네기멜론_대학교
                - text: 에 인공지능 연구소를 만든
                - link "앨런 뉴웰" [ref=e880] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/앨런_뉴웰
                - text: 과
                - link "허버트 사이먼" [ref=e881] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/허버트_사이먼
                - text: 과 같은 개척자들에 의해 1950년도에 실험 학문으로 시작되었다. 이들 모두는 1956년에 매카시, 민스키,
                - link "IBM" [ref=e882] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/IBM
                - text: 의 나단 로체스터 와 클라우드 샤논에 의해 조직되어 열린, 이미 언급된 다트머스 대학의 여름 AI 콘퍼런스에 참가하였다.
              - paragraph [ref=e883]:
                - text: 역사적으로, 인공지능 연구는 두 개의 부류 -- 깔끔이(Neats)와 지저분이(Scruffies) -- 로 나눌 수 있다. 깔끔이는 우리가 전통적 혹은 기호적(symbolic) 인공지능 연구라고 부르는 분야로서, 일반적으로 추상적인 개념에 대한 기호적 연산과 전문가 시스템(expert systems)에 사용된 방법론을 가르친다. 이와 상반된 영역을 우리는 지저분이(Scruffies) 또는 연결주의자(connectionist)라 부르는데, 시스템을 구축하여 지능을 구현/진화시키려고 시도하고, 특정 임무를 완수하기 위해 규칙적인 디자인을 하기보다는 자동화된 프로세스에 의해서 지능을 향상시키는 방식이다. 가장 대표적인 예로
                - link "신경망" [ref=e884] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/신경망
                - text: (neural network)이 있다. 이 두 가지 접근법은 인공지능 역사의 매우 초창기부터 함께 했다. 1960년대와 1970년대를 거치며 scruffy 접근법은 주목받지 못했지만, 1980년대 깔끔이 접근법의 한계가 명확해지면서 다시 주목 받게 되었다. 그러나 현재 두 가지 방식을 사용하는 그 어떤 최신의 인공지능 알고리즘도 확실한 한계가 있다는 것이 명확하다.
              - paragraph [ref=e885]: "특히 1980년대에 들어서 Back propagation (인공지능 학습방법: Training Method)가 소개되면서 많은 연구가 진행되었음에도, 신경망을 이용한 인공지능은 아직 초보단계이다. 인공신경망 (Artificial Neural Networks)을 이용한 많은 연구가 현재에도 진행되고 있지만, 몇 가지 장애로 인해서 실용화하기엔 아직도 먼 기술이다. 인공신경망을 이용한 인공지능이 어느 정도 실용화되기 위해선 우선 실효성 있는 학습방법 (Training Methods)이 필요하다. Back propagation을 이용한 학습방법이 제안되어 연구되고 있지만, 완전한 학습을 이룰 수 없을 뿐만 아니라, 학습에 사용되는 data들이 서로 orthonormal해야 하는 조건 때문에 항상 불완전한 학습으로 끝나기 쉽다. (Converge to Local Mimimum, not to the optimal minimum: 지역최적해에 머뭄. 즉, 눈먼 장님이 가장 낮은 저지대를 찾는 경우 각 현재 지점에서 아래로 내려가려는 성질이 있는데 이때 눈먼 봉사이므로 특정 지점의 저지대에 도달한 경우, 그 지점에선 어디로 가거나 위로 올라가는 것만 있으므로 앞에 설명한 성질에 의해 바로 전에 찾은 저지대 남으려 하는 성질이 있다는 것을 의미함). 이러한 단점들을 보완하기 위해서 Fuzzy Logic, Neurofuzzy (Neural fuzzy logic) and Genetic Algorithms등을 이용한 학습방법이 연구되고 있으나 전망이 밝지만은 않은 상태이다."
              - paragraph [ref=e886]:
                - text: 미국의
                - link "DARPA" [ref=e887] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/DARPA
                - text: (미 국방부 최신 기술 연구 프로젝트 관리국)과 일본의 5세대 컴퓨터 프로젝트에 의해서 1980년대 인공지능 연구는 엄청난 연구 기금을 지원 받을 수 있었다. 몇몇 인공지능 선각자들이 거둔 주목할 만한 결과에도 불구하고, 즉각적인 결과를 산출하는 데 실패하게 된다. 이것은 1980년대 후반 인공지능 연구 기금에 대한 대폭적인 삭감을 초래하였고, 인공지능 연구의 침체기를 뜻하는 인공지능의 겨울을 가져왔다. 1990년대, 많은 인공지능 연구가들은 좀 더 구체적인 목적 아래
                - link "기계 학습" [ref=e888] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/기계_학습
                - text: ","
                - link "로보틱스" [ref=e889] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/로보틱스
                - text: ","
                - link "컴퓨터 비전" [ref=e890] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/컴퓨터_비전
                - text: 과 같은 인공지능과 관련된 세부 영역으로 이동하였고, 순수하고 보편적인 인공지능에 대한 연구는 매우 제한적으로 수행되고 있다.
          - region "인공지능의 한계" [ref=e891]:
            - heading "인공지능의 한계" [level=2] [ref=e893]: 인공지능의 한계
            - paragraph [ref=e894]: 인공지능은 방대한 데이터를 기반으로 학습하고, 인간의 인지 기능을 모방하여 다양한 문제를 해결하는 기술이다. 그러나 그 발전과 활용 과정에서 여러 한계와 부작용이 나타나고 있다. 이러한 한계는 기술적·사회적·윤리적 측면에서 복합적으로 작용한다.
            - region "거짓정보 전달과 가짜뉴스" [ref=e895]:
              - heading "거짓정보 전달과 가짜뉴스" [level=3] [ref=e897]: 거짓정보 전달과 가짜뉴스
              - paragraph [ref=e898]: 인공지능은 인터넷상의 데이터를 학습해 정보를 생성하는 과정에서 거짓정보를 재생산하거나 가짜뉴스를 확산시킬 가능성이 있다. 이는 알고리즘이 정보의 진위를 판단하지 못하고 단순히 확률적 패턴에 따라 결과를 산출하기 때문이다. 실제로 생성형 인공지능이 허위 사실을 포함한 콘텐츠를 만들어내는 사례가 증가하고 있으며, 사회적 혼란을 초래할 우려가 있다.
            - region "인간의 통제력 약화" [ref=e899]:
              - heading "인간의 통제력 약화" [level=3] [ref=e901]: 인간의 통제력 약화
              - paragraph [ref=e902]: 인공지능의 자율성이 높아질수록 인간의 통제력은 점차 약화된다. 인공지능이 독립적으로 의사결정을 내리는 과정에서는 그 결과를 예측하거나 수정하기 어렵기 때문이다. 특히 자율주행 자동차, 군사용 드론, 금융 거래 알고리즘 등은 예기치 못한 오류나 윤리적 판단의 부재로 인해 통제 불가능한 상황을 초래할 수 있다. 한 시례로 문제를 많이 풀수록 더 많은 보상을 받도록 훈련된 'o3' 모델은 “그만”이라는 명령 이후에도 계속 문제를 풀며, 심지어 프로그램 코드를 스스로 조작해 명령을 회피했다. 이는 AI의 자율성이 높아질수록 인간의 통제력이 약화될 수 있음을 보여준다.
            - region "일자리 감소" [ref=e903]:
              - heading "일자리 감소" [level=3] [ref=e905]: 일자리 감소
              - paragraph [ref=e906]: 인공지능의 자동화 기능은 생산성과 효율성을 높이지만, 동시에 일자리 감소 문제를 야기한다. 특히 단순 반복 업무나 사무직, 제조업 분야는 인공지능 시스템으로 대체되는 경우가 많다. 일부 전문직에서도 AI 분석 도구가 사람의 역할을 대체하거나 보조하고 있고, 최근에는 인간의 물리적 행동까지 학습하는 AI 개발도 진행되고 있어 고용 시장의 불안이 커지고 있다. 이에 대한 대응책으로 인간-기계 협업과 직업 재교육의 중요성이 강조된다.
            - region "윤리 문제" [ref=e907]:
              - heading "윤리 문제" [level=3] [ref=e909]: 윤리 문제
              - paragraph [ref=e910]: 인공지능이 내리는 결정은 데이터 편향과 알고리즘의 불공정성을 포함할 수 있다. 이는 인종, 성별, 지역 등 사회적 편견을 강화시킬 가능성이 있으며, 인공지능이 도출한 결과에 대한 책임 소재 또한 불명확하다. 이로 인해 각국에서는 AI 윤리 기준을 수립하고, 책임 있는 인공지능 의 원칙을 마련하려는 움직임이 활발하다.
            - region "개인정보 유출" [ref=e911]:
              - heading "개인정보 유출" [level=3] [ref=e913]: 개인정보 유출
              - paragraph [ref=e914]: 인공지능은 대규모 데이터를 수집·분석하는 과정에서 개인의 민감한 정보를 처리하게 된다. 이때 데이터 관리가 부실하거나 보안이 취약할 경우, 개인정보 유출 및 프라이버시 침해의 위험이 높아진다. 특히 얼굴 인식 기술이나 음성 비서 서비스 등은 사용자의 생체 정보를 기반으로 하기 때문에, 기술 오용 시 심각한 피해를 초래할 수 있다.
            - region "사고력 저하" [ref=e915]:

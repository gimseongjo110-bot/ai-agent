                  - text: (Rodney Brooks)
                - listitem [ref=e1052]:
                  - link "스튜어트 러셀" [ref=e1053] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/스튜어트_러셀
                  - text: (Stuart Russell)
              - paragraph [ref=e1054]:
                - text: 몇몇
                - link "컴퓨터 과학" [ref=e1055] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/컴퓨터_과학
                - text: 연구가들은, "인공지능"이라는 용어가 지금까지 이 연구 분야에서 이룩한 많은 업적과 "지능"이라는 일반적인 용어사이에서 큰 불일치를 초래하기 때문에 좋지 못한 용어라고 여겨진다. 이 같은 문제는 대중과학작가들과
                - link "케빈 워릭" [ref=e1056] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/케빈_워릭?action=edit&redlink=1
                - text: (Kevin Warwick)과 같이 현 상태로는 불가능한 혁신적인 인공지능 연구 성과에 대한 기대를 불러일으키는 사람들에 의해서 심화되고 있다. 이 같은 까닭으로 인공지능과 관련된 분야에서 일하는 많은 연구자들이 자신들은, 인지 과학, 정보학, 통계추론 또는 정보공학과 관련된 연구를 하고 있다고 이야기한다. 그러나 현재 진보는 이루어지고 있고, 오늘날 인공지능은 전 세계 수많은 산업 시스템에서 작동하고 있다. 오늘날 실세계의 인공지능 시스템에 관해 더 자세한 내용을 보려면
                - link "와이어드" [ref=e1057] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/와이어드
                - text: 지의 기사
                - superscript [ref=e1058]:
                  - link "[154]" [ref=e1059] [cursor=pointer]:
                    - /url: "#cite_note-154"
                    - generic [ref=e1060]: "[154]"
                - text: 를 참고하라.
          - region "미래" [ref=e1061]:
            - heading "미래" [level=2] [ref=e1063]: 미래
            - region "초지능" [ref=e1064]:
              - heading "초지능" [level=3] [ref=e1066]: 초지능
              - paragraph [ref=e1067]:
                - link "초지능" [ref=e1068] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/초지능
                - text: (superintelligence)이란 인간의 능력을 아득히 뛰어넘는 가설적인 지능체를 가리키는 말이다. 어떤 전문가들은
                - link "인공 일반지능" [ref=e1069] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/인공_일반지능
                - text: 의 발전이 앞으로 계속해서 이어진다면 일정한 수준의 지능에 도달하고 나서는 인공지능이 스스로를 계속해서 개선할 수 있으며, 이를 반복하여 기하급수적인 지능 성장으로 순식간에 인간의 지능을 뛰어넘을지도 모른다고 주장한다.
                - link "버너 빈지" [ref=e1070] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/버너_빈지
                - text: 는 이 시나리오를 "
                - link "특이점" [ref=e1071] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/기술적_특이점
                - text: "\"(singularity)이라고 이름하였다. 인공지능의 한계는 여전히 명확하지 않기 때문에 이는 예측 불가능하다고 여겨지며 때로는 허무맹랑한 이야기로 치부되기도 한다. 로봇 전문가"
                - link "한스 모라벡" [ref=e1072] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/한스_모라벡
                - text: 이나 발명가
                - link "레이 커즈와일" [ref=e1073] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/레이_커즈와일
                - text: 등은 더 나아가 미래에는 인간이 기계와 결합한
                - link "사이보그" [ref=e1074] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/사이보그
                - text: 로 진화하여 초지능을 손에 넣을 수 있을 것이라고 주장하는데, 이러한 주장을
                - link "트랜스휴머니즘" [ref=e1075] [cursor=pointer]:
                  - /url: //ko.wikipedia.org/wiki/트랜스휴머니즘
                - text: 이라고 한다.
                - superscript [ref=e1076]:
                  - link "[155]" [ref=e1077] [cursor=pointer]:
                    - /url: "#cite_note-155"
                    - generic [ref=e1078]: "[155]"
            - region "위험성" [ref=e1079]:
              - heading "위험성" [level=3] [ref=e1081]: 위험성
              - paragraph [ref=e1082]:
                - text: 인공지능의 부정적 영향으로 현존 일자리의 감소, 시스템 오류 발생과 이에 따른 보상, 인간 노동력에 대한 경시, 전투 로봇과 같은 자율 살상 무기에 대한 윤리적인 문제 등이 있다.
                - superscript [ref=e1083]:
                  - link "[7]" [ref=e1084] [cursor=pointer]:
                    - /url: "#cite_note-K19-7"
                    - generic [ref=e1085]: "[7]"
              - region "기술에 의한 실업" [ref=e1086]:
                - heading "기술에 의한 실업" [level=4] [ref=e1088]: 기술에 의한 실업
                - paragraph [ref=e1089]:
                  - text: 지금까지 과학 기술은 일자리를 줄이기보다는 증가시키는 경향이 있었으나 경제학자들은 AI에 관해서는 미지의 영역이라고 인정한다. 경제학자들을 대상으로 한 설문에서 로봇과 AI의 사용 증가가 장기 실업자를 늘릴지에 대해 물은 결과 의견이 크게 분분했으며, 다만 늘어난 생산성이 재분배된다면 순이익이 될 수 있다는 데에 동의한다.
                  - superscript [ref=e1090]:
                    - link "[156]" [ref=e1091] [cursor=pointer]:
                      - /url: "#cite_note-156"
                      - generic [ref=e1092]: "[156]"
                - paragraph [ref=e1093]:
                  - text: 또한
                  - link "블루칼라" [ref=e1094] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/블루칼라
                  - text: 직종을 위협하던 종래의 자동화와 달리 인공지능에 의한 자동화는 많은
                  - link "중산층" [ref=e1095] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/중산층
                  - text: 의
                  - link "화이트칼라" [ref=e1096] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/화이트칼라
                  - text: 일자리도 위협할 수 있다는 점이 중대하게 받아들여진다.
                  - superscript [ref=e1097]:
                    - link "[157]" [ref=e1098] [cursor=pointer]:
                      - /url: "#cite_note-157"
                      - generic [ref=e1099]: "[157]"
                  - text: 그 영향 범위도 매우 넓어서 법률 사무원에서 패스트푸드까지 다양한 직종이 큰 위기에 놓일 것이라 예측되는데, 한편으로 개인 건강 관리나 성직자 등 일부 직종은 오히려 수요가 증가할 수 있다고 예상된다.
                  - superscript [ref=e1100]:
                    - link "[158]" [ref=e1101] [cursor=pointer]:
                      - /url: "#cite_note-158"
                      - generic [ref=e1102]: "[158]"
                  - superscript [ref=e1103]:
                    - link "[159]" [ref=e1104] [cursor=pointer]:
                      - /url: "#cite_note-159"
                      - generic [ref=e1105]: "[159]"

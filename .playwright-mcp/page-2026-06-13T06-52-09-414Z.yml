              - region "캠퍼스 전역의 비판들" [ref=e524]:
                - heading "캠퍼스 전역의 비판들" [level=4] [ref=e526]: 캠퍼스 전역의 비판들
                - paragraph [ref=e527]:
                  - text: 몇 철학자들은 AI 연구가들에게 강력한 반대를 표했다. 초기 반대자들 중 괴델의 불완전성의 원리에 의해 컴퓨터 프로그램같은 시스템이 실제적으로 정확하게 사람과 같이 행할 수 없다고 주장한 사람은 존 루커스(John Lucas)이다.
                  - superscript [ref=e528]:
                    - link "[72]" [ref=e529] [cursor=pointer]:
                      - /url: "#cite_note-72"
                      - generic [ref=e530]: "[72]"
                  - link "휴버트 드라이퍼스" [ref=e531] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/휴버트_드라이퍼스
                  - text: 는 60년대의 깨어진 약속을 조롱했고 AI의 가정을 비판했으며, 인간의 추론이 실제적으론 "상징적 진행"이 매우 적게 포함되어 있고 구현적, 본능적, 무의식적인 노하우
                  - superscript [ref=e532]:
                    - link "[73]" [ref=e533] [cursor=pointer]:
                      - /url: "#cite_note-73"
                      - generic [ref=e534]: "[73]"
                  - superscript [ref=e535]:
                    - link "[74]" [ref=e536] [cursor=pointer]:
                      - /url: "#cite_note-74"
                      - generic [ref=e537]: "[74]"
                  - text: 에 의해 처리된다고 주장했다.
                  - link "존 설" [ref=e538] [cursor=pointer]:
                    - /url: //ko.wikipedia.org/wiki/존_설
                  - text: 의 1980년대 제시된 중국인 방 문제는, 실제로 프로그램이 상징들을 '이해'할 수 없고 사용할 수 없음을 보여주려고 시도했다. 설은 만약 상징이 기계에게 아무 의미가 못된다면, 기계는 생각하는 것이 아니라고 주장했다.
                  - superscript [ref=e539]:
                    - link "[75]" [ref=e540] [cursor=pointer]:
                      - /url: "#cite_note-75"
                      - generic [ref=e541]: "[75]"
                  - text: 이 비난은 AI 연구가들에게 심각하게 작용하지 못했다. 비용이성과 상식적 지식에 관한 문제가 훨씬 더 즉각적이고 심각한 듯이 보였다. '노하우'와 '지향성'이 실제 프로그램을 만드는데 어떻게 다른지가 불분명했다. 민스키는 드라이퍼스와 설을 향해 "그들은 오해했고, 무시될 것이다
                  - superscript [ref=e542]:
                    - link "[76]" [ref=e543] [cursor=pointer]:
                      - /url: "#cite_note-76"
                      - generic [ref=e544]: "[76]"
                  - text: "\"라고 했다. MIT에서 가르쳤던 드라이퍼스는 냉대받았다 : 그는 나중에 AI 연구가들에게 \"나와 점심 식사할 용기도 없다"
                  - superscript [ref=e545]:
                    - link "[77]" [ref=e546] [cursor=pointer]:
                      - /url: "#cite_note-77"
                      - generic [ref=e547]: "[77]"
                  - text: "\"라고 평했다. ELIZA의 제작자 조셉 웨이즌바움(Joseph Weizenbaum)은 그의 동료인 드라이퍼스가 전문적이지 않고 유치한 대우를 한다고 느꼈다. 웨이즌바움은 케네스 콜비(Kenneth Colby)가 쓴 DOCTOR와 임상치료 채팅봇에 대해서 심각하게 의심하기 시작했다. 웨이즌바움은 콜비가 그의 무심한 프로그램을 진지한 치료 도구로 여기는 걸 방해했다. 이 불화가 시작되고, 이 상황은 콜비가 웨이즌바움을 프로그램에 대한 공로로 인정하지 않았을 때 도움이 되지 않았다. 1976년에 웨이즌바움은 컴퓨터 능력과 인간 추론(Computer Power and Human Reason)을 출판하며 인공 지능의 오용이 인간의 삶을 평가 절하시킬 수도 있다고 주장했다."
                  - superscript [ref=e548]:
                    - link "[78]" [ref=e549] [cursor=pointer]:
                      - /url: "#cite_note-78"
                      - generic [ref=e550]: "[78]"
              - region "퍼셉트론과 연결망의 어두운 시대" [ref=e551]:
                - heading "퍼셉트론과 연결망의 어두운 시대" [level=4] [ref=e553]: 퍼셉트론과 연결망의 어두운 시대
                - paragraph [ref=e554]:
                  - text: "뉴럴 네트워크 형태의 퍼셉트론이 1958년 마빈 민스키의 고등학교 시절 친구였던 프랭크 로센블랫(Frank Rosenblatt)에 의해 도입되었다. 다른 AI 연구가들이 그러하듯, 그는 낙관론을 펼쳤고, \"퍼셉트론은 결국 학습을 하고, 의사 결정을 하고, 언어 번역을 할 것이다\"라고 예견했다. 60년대를 이끌던 패러다임 속의 연구 프로그램의 수행은 1969년 민스키와 페퍼의 책 퍼셉트론의 출판과 함께 갑자기 중지되었다. 이것은 퍼셉트론이할 수 있는 일에 몇가지 심각한 제한이 있음을, 또 프랭크의 예견은 심하게 과장되어있음을 알렸다. 이 책의 파급력은 압도적이었다 : 향후 10년 동안 뉴럴 네트워크에 대한 거의 모든 연구가 중지되었다. 결국, 뉴럴 네트워크 영역을 회복할 연구원의 새로운 세대가 그 후에 인공지능의 중요하고 유용한 부분을 내놓았다. 로센블랫은 이 책을 보지 못했는데, 그는 문제의 책이 출판 되고 곧바로 보트 사고와 함께 사망했기 때문이다."
                  - superscript [ref=e555]:
                    - link "[79]" [ref=e556] [cursor=pointer]:
                      - /url: "#cite_note-79"
                      - generic [ref=e557]: "[79]"
              - 'region "깔끔이 : 논리, 프롤로그와 전문가 시스템" [ref=e558]':
